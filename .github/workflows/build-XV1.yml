name: Sony Xperia 1 V Kernel Build (SukiSU Ultra + susFS + KPM)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: "Android version"
        required: true
        default: "android15"
      kernel_branch:
        description: "Kernel branch"
        required: true
        default: "lineage-22.2"
      defconfig_url:
        description: "Raw URL to pdx234_defconfig"
        required: true
        default: "https://raw.githubusercontent.com/spacealtctrl/android_kernel_sony_sm8550/lineage-22.2/arch/arm64/configs/vendor/sony/pdx234_defconfig"
      use_sukisu:
        description: "Use SukiSU Ultra"
        required: true
        default: "true"
      use_susfs:
        description: "Apply susFS patches"
        required: true
        default: "true"
      use_kpm:
        description: "Apply KPM patches"
        required: true
        default: "true"

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      SUBARCH: arm64
      LLVM: "1"
      LLVM_IAS: "1"
      KBUILD_BUILD_USER: "ci"
      KBUILD_BUILD_HOST: "github"
      MAKE_JOBS: "8"

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gperf libncurses-dev libssl-dev \
            libxml2-utils lzop pkg-config python3 rsync unzip wget xz-utils zip zlib1g-dev

      - name: Prepare workspace
        run: mkdir -p workspace

      - name: Clone Sony kernel source
        working-directory: workspace
        run: |
          git clone --depth 1 --branch ${{ inputs.kernel_branch }} \
            https://github.com/spacealtctrl/android_kernel_sony_sm8550 kernel
          echo "KERNEL_TOP=$(pwd)/kernel" >> $GITHUB_ENV

      - name: Download pdx234_defconfig
        working-directory: ${{ env.KERNEL_TOP }}
        run: |
          mkdir -p arch/arm64/configs/vendor/sony
          curl -L "${{ inputs.defconfig_url }}" -o arch/arm64/configs/vendor/sony/pdx234_defconfig

      - name: Fetch Android 15 Clang toolchain
        working-directory: workspace
        run: |
          mkdir -p toolchains && cd toolchains
          CLANG_URL="https://commondatastorage.googleapis.com/android-ci/clang/clang-r530567.tar.xz"
          wget -q "$CLANG_URL" -O clang.tar.xz
          mkdir -p clang && tar -xf clang.tar.xz -C clang --strip-components=1
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Apply SukiSU Ultra (if enabled)
        if: ${{ inputs.use_sukisu == 'true' }}
        working-directory: workspace
        run: |
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra suki
          bash suki/scripts/apply.sh "${KERNEL_TOP}"

      - name: Apply susFS (if enabled)
        if: ${{ inputs.use_susfs == 'true' }}
        run: bash scripts/apply_susfs.sh "${KERNEL_TOP}"

      - name: Apply KPM (if enabled)
        if: ${{ inputs.use_kpm == 'true' }}
        run: bash scripts/apply_kpm.sh "${KERNEL_TOP}"

      - name: Configure kernel
        working-directory: ${{ env.KERNEL_TOP }}
        run: make O=out vendor/sony/pdx234_defconfig

      - name: Build kernel
        working-directory: ${{ env.KERNEL_TOP }}
        run: make -j${MAKE_JOBS} O=out

      - name: Install modules
        working-directory: ${{ env.KERNEL_TOP }}
        run: |
          mkdir -p out/modules_install
          make -j${MAKE_JOBS} O=out modules_install INSTALL_MOD_PATH=out/modules_install

      - name: Package with AnyKernel3
        working-directory: workspace
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cd AnyKernel3
          cp "${KERNEL_TOP}/out/arch/arm64/boot/Image.gz-dtb" ./Image.gz-dtb
          cp "${KERNEL_TOP}/out/arch/arm64/boot/dtbo.img" ./dtbo.img || true
          rsync -a "${KERNEL_TOP}/out/modules_install/lib/modules/" ./modules/ || true
          zip -r9 "../kernel-pdx234-sukisu-${{ inputs.android_version }}.zip" ./*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sony-kernel-${{ inputs.android_version }}
          path: workspace/*.zip
