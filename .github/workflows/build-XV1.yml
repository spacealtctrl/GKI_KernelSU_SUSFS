name: Sony Xperia 1 V Kernel Build (LineageOS 22.2 / Android 15)

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch'
        required: true
        default: 'lineage-22.2'
      defconfig_url:
        description: 'Raw URL of pdx234_defconfig'
        required: true
        default: 'https://raw.githubusercontent.com/spacealtctrl/android_kernel_sony_sm8550/lineage-22.2/arch/arm64/configs/vendor/sony/pdx234_defconfig'
      use_sukisu:
        description: 'Apply SukiSU Ultra'
        required: true
        default: 'true'
      use_susfs:
        description: 'Apply susFS'
        required: true
        default: 'true'
      use_kpm:
        description: 'Apply KPM'
        required: true
        default: 'true'
      anykernel_repo:
        description: 'AnyKernel3 repo'
        required: true
        default: 'https://github.com/osm0sis/AnyKernel3'
      device_codename:
        description: 'Device codename for AnyKernel3'
        required: true
        default: 'pdx234'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      ARCH: arm64
      SUBARCH: arm64
      LLVM: '1'
      LLVM_IAS: '1'
      KBUILD_BUILD_USER: 'ci'
      KBUILD_BUILD_HOST: 'github'
      MAKEFLAGS: '-j8'
      KERNEL_FORK: 'https://github.com/spacealtctrl/android_kernel_sony_sm8550'
      KSRC: ${{ github.workspace }}/workspace/kernel

    steps:
      - name: Checkout GKI_KernelSU_SUSFS
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git gperf libncurses-dev libssl-dev \
            libtinfo5 libxml2-utils lzop pkg-config python3 \
            rsync unzip wget xz-utils zip zlib1g-dev

      - name: Prepare workspace
        run: mkdir -p workspace

      - name: Clone Xperia 1 V kernel
        working-directory: workspace
        run: |
          git clone --depth=1 \
            --branch "${{ inputs.kernel_branch }}" \
            "${{ env.KERNEL_FORK }}" \
            kernel

      - name: Fetch Android 15 Clang toolchain
        working-directory: workspace
        run: |
          mkdir -p toolchains && cd toolchains
          CLANG_TAG=clang-r530567
          # exactly the same archive URL & extract as your gki-kernel.yml
          curl -sSL \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/${CLANG_TAG}?format=tar.gz" \
            | tar -xz --strip-components=1
          echo "${PWD}/bin" >> $GITHUB_PATH

      - name: Show clang version
        run: |
          clang --version
          ld.lld --version

      - name: Inject defconfig
        working-directory: ${{ env.KSRC }}
        run: |
          mkdir -p arch/arm64/configs/vendor/sony
          curl -L "${{ inputs.defconfig_url }}" \
            -o arch/arm64/configs/vendor/sony/pdx234_defconfig

      - name: Apply SukiSU Ultra
        if: ${{ inputs.use_sukisu == 'true' }}
        working-directory: workspace
        run: |
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra suki
          bash suki/scripts/apply.sh "${{ env.KSRC }}"

      - name: Apply susFS
        if: ${{ inputs.use_susfs == 'true' }}
        run: bash scripts/apply_susfs.sh "${{ env.KSRC }}"

      - name: Apply KPM
        if: ${{ inputs.use_kpm == 'true' }}
        run: bash scripts/apply_kpm.sh "${{ env.KSRC }}"

      - name: Defconfig & merge new CONFIGs
        working-directory: ${{ env.KSRC }}
        run: |
          make O=out vendor/sony/pdx234_defconfig
          make -C . O=out olddefconfig

      - name: Compile kernel
        working-directory: ${{ env.KSRC }}
        run: make O=out

      - name: Install modules
        working-directory: ${{ env.KSRC }}
        run: make O=out modules_install INSTALL_MOD_PATH=out/modules

      - name: Package AnyKernel3 zip
        working-directory: workspace
        run: |
          git clone --depth=1 "${{ inputs.anykernel_repo }}" AnyKernel3
          cd AnyKernel3
          cp "${{ env.KSRC }}/out/arch/arm64/boot/Image.gz-dtb" ./Image.gz-dtb
          cp "${{ env.KSRC }}/out/arch/arm64/boot/dtbo.img" ./dtbo.img || true
          rsync -a "${{ env.KSRC }}/out/modules/lib/modules/" ./modules/ || true
          echo "${{ inputs.device_codename }}" > device_codename.txt
          zip -r9 "../kernel-${{ inputs.device_codename }}-a15-$(date +%Y%m%d).zip" ./*

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: sony-pdx234-kernel-a15
          path: workspace/*.zip
