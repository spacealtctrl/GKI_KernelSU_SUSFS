name: Build Xperia 1 V kernel with SukiSU Ultra + susFS + KPM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      SUBARCH: arm64
      LLVM: "1"
      LLVM_IAS: "1"
      KBUILD_BUILD_USER: "ci"
      KBUILD_BUILD_HOST: "github"
      MAKE_JOBS: "8"

    steps:
      - name: Checkout this repo (patch scripts)
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gperf libncurses-dev libssl-dev libtinfo5 \
            libxml2-utils lzop pkg-config python3 rsync unzip wget xz-utils zip zlib1g-dev

      - name: Prepare workspace
        run: mkdir -p workspace

      - name: Clone kernel source (your fork)
        working-directory: workspace
        run: |
          git clone --depth 1 --single-branch --branch lineage-22.2 \
            https://github.com/spacealtctrl/android_kernel_sony_sm8550 kernel
          echo "KERNEL_TOP=$(pwd)/kernel" >> $GITHUB_ENV

      - name: Fetch Android 15 clang toolchain
        working-directory: workspace
        run: |
          mkdir -p toolchains && cd toolchains
          CLANG_URL="https://commondatastorage.googleapis.com/android-ci/clang/clang-r530567.tar.xz"
          wget -q "$CLANG_URL" -O clang.tar.xz
          mkdir -p clang && tar -xf clang.tar.xz -C clang --strip-components=1
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Download pdx234_defconfig
        working-directory: ${{ env.KERNEL_TOP }}
        run: |
          mkdir -p arch/arm64/configs/vendor/sony
          curl -L \
            https://raw.githubusercontent.com/spacealtctrl/android_kernel_sony_sm8550/lineage-22.2/arch/arm64/configs/vendor/sony/pdx234_defconfig \
            -o arch/arm64/configs/vendor/sony/pdx234_defconfig

      - name: Apply SukiSU Ultra + susFS + KPM patches
        working-directory: workspace
        run: |
          # Clone SukiSU Ultra
          git clone --depth=1 https://github.com/sukisu-ultra/sukisu-ultra suki
          cd suki

          # Apply kernel patch (adjust path if needed)
          bash scripts/apply.sh "${KERNEL_TOP}"

          # If susFS/KPM need extra patches, apply them here
          # Example: bash ../GKI_KernelSU_SUSFS/scripts/apply_susfs.sh "${KERNEL_TOP}"
          # Example: bash ../GKI_KernelSU_SUSFS/scripts/apply_kpm.sh "${KERNEL_TOP}"

      - name: Configure kernel
        working-directory: ${{ env.KERNEL_TOP }}
        run: make O=out vendor/sony/pdx234_defconfig

      - name: Build kernel
        working-directory: ${{ env.KERNEL_TOP }}
        run: make -j${MAKE_JOBS} O=out

      - name: Install modules
        working-directory: ${{ env.KERNEL_TOP }}
        run: |
          mkdir -p out/modules_install
          make -j${MAKE_JOBS} O=out modules_install INSTALL_MOD_PATH=out/modules_install

      - name: Package with AnyKernel3
        working-directory: workspace
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cd AnyKernel3
          cp "${KERNEL_TOP}/out/arch/arm64/boot/Image.gz-dtb" ./Image.gz-dtb
          cp "${KERNEL_TOP}/out/arch/arm64/boot/dtbo.img" ./dtbo.img || true
          rsync -a "${KERNEL_TOP}/out/modules_install/lib/modules/" ./modules/ || true
          zip -r9 "../kernel-pdx234-sukisu-$(date +%Y%m%d).zip" ./*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: workspace/*.zip
