name: Sony Xperia 1 V Kernel Build (LineageOS 22.2 / Android 15)

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch'
        required: true
        default: 'lineage-22.2'
        type: string
      defconfig_name:
        description: 'Defconfig name'
        required: true
        default: 'pdx234_defconfig'
        type: string
      use_sukisu:
        description: 'Apply SukiSU Ultra'
        required: true
        default: true
        type: boolean
      use_susfs:
        description: 'Apply susFS'
        required: true
        default: true
        type: boolean
      use_kpm:
        description: 'Apply KPM'
        required: true
        default: true
        type: boolean
      anykernel_repo:
        description: 'AnyKernel3 repo'
        required: true
        default: 'https://github.com/osm0sis/AnyKernel3'
        type: string
      device_codename:
        description: 'Device codename for AnyKernel3'
        required: true
        default: 'pdx234'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      ARCH: arm64
      SUBARCH: arm64
      LLVM: '1'
      LLVM_IAS: '1'
      KBUILD_BUILD_USER: 'spacealtctrl'
      KBUILD_BUILD_HOST: 'github-actions'
      MAKEFLAGS: '-j$(($(nproc) + 1))'
      KERNEL_REPO: 'https://github.com/spacealtctrl/android_kernel_sony_sm8550'
      KSRC: ${{ github.workspace }}/workspace/kernel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo apt-get purge -y azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* adoptopenjdk* mysql* php* mongodb* dotnet* moby* snapd* android*
          sudo apt-get autoremove -y
          sudo apt-get autoclean -y
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/share/boost /opt/hostedtoolcache
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo swapoff -a
          sudo rm -f /swapfile
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 python3-pip file ca-certificates wget

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: xperia1v-kernel-${{ inputs.kernel_branch }}
          max-size: 2G

      - name: Prepare workspace
        run: |
          mkdir -p workspace
          cd workspace
          echo "WORKSPACE=$(pwd)" >> $GITHUB_ENV

      - name: Clone kernel source
        working-directory: workspace
        run: |
          echo "Cloning kernel from ${{ env.KERNEL_REPO }} branch ${{ inputs.kernel_branch }}"
          
          # Clone without the branch that has the defconfig to avoid conflicts
          git clone --depth=1 \
            --branch "${{ inputs.kernel_branch }}" \
            --single-branch \
            "${{ env.KERNEL_REPO }}" \
            kernel_temp
          
          # Remove the defconfig if it exists (we'll download the correct one)
          rm -rf kernel_temp/arch/arm64/configs/vendor/sony/pdx234_defconfig
          
          # Move to final location
          mv kernel_temp kernel
          
          cd kernel
          echo "Kernel commit: $(git rev-parse HEAD)"

      - name: Download Android 15 Clang toolchain
        working-directory: workspace
        run: |
          echo "Downloading Android 15 Clang toolchain..."
          mkdir -p clang
          cd clang
          
          # Use the same method as the working GKI workflow
          CLANG_VERSION="clang-r530567"
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/${CLANG_VERSION}.tar.gz"
          
          # Download and extract
          wget -q -O clang.tar.gz "${CLANG_URL}"
          tar -xzf clang.tar.gz
          rm clang.tar.gz
          
          # Add to PATH
          echo "${PWD}/bin" >> $GITHUB_PATH
          
          # Verify installation
          ls -la bin/clang* || true

      - name: Verify toolchain
        run: |
          which clang
          clang --version
          which ld.lld
          ld.lld --version

      - name: Setup defconfig
        working-directory: ${{ env.KSRC }}
        run: |
          # Check if defconfig exists in the expected location
          DEFCONFIG_PATH="arch/arm64/configs/vendor/sony/${{ inputs.defconfig_name }}"
          
          if [ ! -f "${DEFCONFIG_PATH}" ]; then
            echo "Defconfig not found at ${DEFCONFIG_PATH}, checking alternative locations..."
            
            # Check alternative locations
            ALT_PATHS=(
              "arch/arm64/configs/${{ inputs.defconfig_name }}"
              "arch/arm64/configs/vendor/${{ inputs.defconfig_name }}"
            )
            
            for path in "${ALT_PATHS[@]}"; do
              if [ -f "$path" ]; then
                echo "Found defconfig at $path"
                DEFCONFIG_PATH="$path"
                break
              fi
            done
          fi
          
          if [ -f "${DEFCONFIG_PATH}" ]; then
            echo "Using defconfig: ${DEFCONFIG_PATH}"
            echo "KERNEL_DEFCONFIG=${DEFCONFIG_PATH}" >> $GITHUB_ENV
          else
            echo "Error: Defconfig ${{ inputs.defconfig_name }} not found!"
            exit 1
          fi

      - name: Apply SukiSU Ultra
        if: ${{ inputs.use_sukisu == true }}
        working-directory: workspace
        run: |
          echo "Applying SukiSU Ultra..."
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra sukisu
          
          if [ -f "sukisu/scripts/apply.sh" ]; then
            bash sukisu/scripts/apply.sh "${{ env.KSRC }}"
          else
            echo "SukiSU apply script not found, trying manual method..."
            cd sukisu
            if [ -f "setup.sh" ]; then
              bash setup.sh "${{ env.KSRC }}"
            else
              echo "Warning: Could not find SukiSU setup script"
            fi
          fi

      - name: Apply susFS
        if: ${{ inputs.use_susfs == true }}
        run: |
          echo "Applying susFS..."
          if [ -f "scripts/apply_susfs.sh" ]; then
            bash scripts/apply_susfs.sh "${{ env.KSRC }}"
          else
            echo "susFS script not found in repo, downloading..."
            cd workspace
            git clone --depth=1 https://github.com/Linus4world/susfs susfs
            if [ -f "susfs/apply.sh" ]; then
              bash susfs/apply.sh "${{ env.KSRC }}"
            else
              echo "Warning: Could not apply susFS"
            fi
          fi

      - name: Apply KPM
        if: ${{ inputs.use_kpm == true }}
        run: |
          echo "Applying KPM..."
          if [ -f "scripts/apply_kpm.sh" ]; then
            bash scripts/apply_kpm.sh "${{ env.KSRC }}"
          else
            echo "KPM script not found in repo, downloading..."
            cd workspace
            git clone --depth=1 https://github.com/rifsxd/KPM-Additions kpm
            if [ -f "kpm/apply.sh" ]; then
              bash kpm/apply.sh "${{ env.KSRC }}"
            else
              echo "Warning: Could not apply KPM"
            fi
          fi

      - name: Configure kernel
        working-directory: ${{ env.KSRC }}
        run: |
          echo "Configuring kernel with ${KERNEL_DEFCONFIG}..."
          
          # Setup build environment
          export PATH="${{ env.WORKSPACE }}/clang/bin:$PATH"
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Clean and configure
          make O=out clean
          make O=out ${{ inputs.defconfig_name }}
          
          # Enable additional features if needed
          scripts/config --file out/.config \
            --enable CONFIG_MODULES \
            --enable CONFIG_MODULE_FORCE_LOAD \
            --enable CONFIG_MODULE_UNLOAD \
            --enable CONFIG_MODULE_FORCE_UNLOAD \
            --enable CONFIG_MODVERSIONS
          
          # Update config
          make O=out olddefconfig
          
          # Show some config values for verification
          echo "Checking key configs:"
          grep -E "CONFIG_LOCALVERSION|CONFIG_MODULES" out/.config || true

      - name: Build kernel
        working-directory: ${{ env.KSRC }}
        run: |
          echo "Building kernel..."
          
          # Setup build environment
          export PATH="${{ env.WORKSPACE }}/clang/bin:$PATH"
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Enable ccache
          export USE_CCACHE=1
          export CCACHE_DIR="${{ github.workspace }}/.ccache"
          
          # Build kernel
          make O=out -j$(nproc)
          
          # Check if Image was built
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "Error: Kernel Image not found!"
            exit 1
          fi
          
          echo "Kernel built successfully!"
          ls -lh out/arch/arm64/boot/

      - name: Build modules
        working-directory: ${{ env.KSRC }}
        run: |
          echo "Building modules..."
          
          export PATH="${{ env.WORKSPACE }}/clang/bin:$PATH"
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          make O=out modules -j$(nproc)
          make O=out INSTALL_MOD_PATH=modules_out modules_install
          
          echo "Modules built:"
          find out/modules_out -name "*.ko" -type f | head -10

      - name: Prepare AnyKernel3 package
        working-directory: workspace
        run: |
          echo "Preparing AnyKernel3 package..."
          
          # Clone AnyKernel3
          git clone --depth=1 "${{ inputs.anykernel_repo }}" AnyKernel3
          cd AnyKernel3
          
          # Copy kernel image
          if [ -f "${{ env.KSRC }}/out/arch/arm64/boot/Image.gz-dtb" ]; then
            cp "${{ env.KSRC }}/out/arch/arm64/boot/Image.gz-dtb" ./
          elif [ -f "${{ env.KSRC }}/out/arch/arm64/boot/Image.gz" ]; then
            cp "${{ env.KSRC }}/out/arch/arm64/boot/Image.gz" ./Image.gz-dtb
          elif [ -f "${{ env.KSRC }}/out/arch/arm64/boot/Image" ]; then
            gzip -c "${{ env.KSRC }}/out/arch/arm64/boot/Image" > ./Image.gz-dtb
          else
            echo "Error: No kernel image found!"
            exit 1
          fi
          
          # Copy dtbo if exists
          if [ -f "${{ env.KSRC }}/out/arch/arm64/boot/dtbo.img" ]; then
            cp "${{ env.KSRC }}/out/arch/arm64/boot/dtbo.img" ./
          fi
          
          # Copy DTBs if they exist
          if [ -d "${{ env.KSRC }}/out/arch/arm64/boot/dts" ]; then
            find "${{ env.KSRC }}/out/arch/arm64/boot/dts" -name "*.dtb" -exec cp {} ./ \; 2>/dev/null || true
          fi
          
          # Copy modules
          if [ -d "${{ env.KSRC }}/out/modules_out/lib/modules" ]; then
            mkdir -p modules/system/lib/modules
            find "${{ env.KSRC }}/out/modules_out/lib/modules" -name "*.ko" -exec cp {} modules/system/lib/modules/ \;
          fi
          
          # Create anykernel.sh configuration
          cat > anykernel.sh << 'EOF'
# AnyKernel3 Ramdisk Mod Script
# osm0sis @ xda-developers

## AnyKernel setup
# begin properties
properties() { '
kernel.string=Xperia 1 V Custom Kernel by spacealtctrl
do.devicecheck=1
do.modules=1
do.systemless=1
do.cleanup=1
do.cleanuponabort=0
device.name1=pdx234
device.name2=XQ-DQ72
device.name3=xperia1v
supported.versions=15
supported.patchlevels=
'; } # end properties

# shell variables
block=/dev/block/bootdevice/by-name/boot;
is_slot_device=1;
ramdisk_compression=auto;
patch_vbmeta_flag=auto;

## AnyKernel methods (DO NOT CHANGE)
# import patching functions/variables - see for reference
. tools/ak3-core.sh;

## AnyKernel install
split_boot;

flash_boot;
flash_dtbo;
## end install
EOF
          
          # Create ZIP filename with date and features
          KERNEL_NAME="Xperia1V-${{ inputs.device_codename }}-LineageOS22.2"
          FEATURES=""
          if [ "${{ inputs.use_sukisu }}" == "true" ]; then FEATURES="${FEATURES}-SukiSU"; fi
          if [ "${{ inputs.use_susfs }}" == "true" ]; then FEATURES="${FEATURES}-susFS"; fi
          if [ "${{ inputs.use_kpm }}" == "true" ]; then FEATURES="${FEATURES}-KPM"; fi
          ZIP_NAME="${KERNEL_NAME}${FEATURES}-$(date +%Y%m%d-%H%M).zip"
          
          # Create the zip
          zip -r9 "../${ZIP_NAME}" * -x .git README.md *placeholder
          
          echo "Created: ${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload kernel package
        uses: actions/upload-artifact@v4
        with:
          name: xperia1v-kernel-lineageos22
          path: workspace/*.zip
          retention-days: 30

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: |
            ${{ env.KSRC }}/out/.config
            ${{ env.KSRC }}/out/include/generated/compile.h
          retention-days: 7

      - name: Print build summary
        run: |
          echo "=== Build Summary ==="
          echo "Device: Sony Xperia 1 V (${{ inputs.device_codename }})"
          echo "Kernel Branch: ${{ inputs.kernel_branch }}"
          echo "Features enabled:"
          if [ "${{ inputs.use_sukisu }}" == "true" ]; then echo "  - SukiSU Ultra"; fi
          if [ "${{ inputs.use_susfs }}" == "true" ]; then echo "  - susFS"; fi
          if [ "${{ inputs.use_kpm }}" == "true" ]; then echo "  - KPM"; fi
          echo "Output: ${ZIP_NAME}"
          echo "===================="
