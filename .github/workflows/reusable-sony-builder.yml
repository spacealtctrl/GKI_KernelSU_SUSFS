name: Reusable Sony Kernel Builder

on:
  workflow_call:
    inputs:
      device:
        required: true
        type: string
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
      use_susfs:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: boolean
      use_lxc:
        required: true
        type: boolean
      get_manager:
        required: true
        type: boolean

env:
  SONY_KERNEL_URL: "https://github.com/sonyxperiadev/kernel.git"
  KERNEL_IMAGE_NAME: "Image"
  ANYKERNEL_URL: "https://github.com/osm0sis/AnyKernel3.git"
  KPM_URL: "https://github.com/backslashxx/KPM.git"
  SUSFS_URL: "https://gitlab.com/simonpunk/susfs4ksu.git"
  SUSFS_MODULE_URL: "https://github.com/sidex15/susfs4ksu_su_module.git"

jobs:
  build:
    name: "Build Kernel for ${{ inputs.device }}"
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: main

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev cpio unzip wget kmod dwarves

      - name: Configure Git
        run: |
          git config --global user.name "spacealtctrl"
          git config --global user.email "actions@github.com"

      - name: Set Device-Specific Variables
        run: |
          case "${{ inputs.device }}" in
            "Xperia 1 VI (pdx245)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1VI" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx245_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx245\ndevice.name2=Xperia 1 VI' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=14" >> $GITHUB_ENV
              ;;
            "Xperia 5 V (pdx237)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-5V" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx237_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx237\ndevice.name2=Xperia 5 V' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=13-14" >> $GITHUB_ENV
              ;;
            "Xperia 1 V (pdx234)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1V" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx234_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx234\ndevice.name2=Xperia 1 V' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=13-14" >> $GITHUB_ENV
              ;;
            "Xperia 1 IV (pdx223)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1IV" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx223_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx223\ndevice.name2=Xperia 1 IV' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=12-13" >> $GITHUB_ENV
              ;;
            "Xperia 5 IV (pdx225)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-5IV" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx225_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx225\ndevice.name2=Xperia 5 IV' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=12-13" >> $GITHUB_ENV
              ;;
            "Xperia PRO-I (pdx215)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-PRO-I" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx215_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx215\ndevice.name2=Xperia PRO-I' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=11-12" >> $GITHUB_ENV
              ;;
            "Xperia 1 III (pdx213)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1III" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx213_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx213\ndevice.name2=Xperia 1 III' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=11-12" >> $GITHUB_ENV
              ;;
            "Xperia 5 III (pdx214)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-5III" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx214_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx214\ndevice.name2=Xperia 5 III' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=11-12" >> $GITHUB_ENV
              ;;
            "Xperia 1 II (pdx203)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1II" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx203_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx203\ndevice.name2=Xperia 1 II' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=10-11" >> $GITHUB_ENV
              ;;
            "Xperia 5 II (pdx206)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-5II" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx206_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx206\ndevice.name2=Xperia 5 II' >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=10-11" >> $GITHUB_ENV
              ;;
          esac

      - name: Setup Clang (with Retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            echo "Setting up Clang toolchain using git clone..."
            AOSP_MIRROR="https://android.googlesource.com/kernel/prebuilts/build-tools"
            BRANCH="main-kernel-build-2024"
            git clone --depth=1 -b "$BRANCH" "$AOSP_MIRROR" build-tools
            echo "TOOLCHAIN_PATH=$(pwd)/build-tools/linux-x86/bin" >> $GITHUB_ENV
            echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV

      - name: Clone Kernel (with Retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: |
            echo "Cloning Sony kernel from default branch..."
            git clone --depth=1 "${{ env.SONY_KERNEL_URL }}" kernel
            echo "KERNEL_PATH=$(pwd)/kernel" >> $GITHUB_ENV

      - name: Integrate KernelSU
        run: |
          cd kernel

          ksu_branch_arg="main"
          if [[ "${{ inputs.kernelsu_branch }}" == "Dev" ]]; then
            ksu_branch_arg="dev"
          fi

          setup_script_url=""
          case "${{ inputs.kernelsu_variant }}" in
            "Official") setup_script_url="https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" ;;
            "Next") setup_script_url="https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" ;;
            "MKSU") setup_script_url="https://raw.githubusercontent.com/5ec1cff/KernelSU/main/kernel/setup.sh" ;;
            "SukiSU"|"SukiSU-Ultra") setup_script_url="https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" ;;
          esac
          
          if [ -z "$setup_script_url" ]; then
            echo "::error::Invalid KernelSU variant selected."
            exit 1
          fi

          echo "Integrating ${{ inputs.kernelsu_variant }} using branch '$ksu_branch_arg'..."
          export GIT_TERMINAL_PROMPT=0
          curl -LSs "$setup_script_url" | bash -s "$ksu_branch_arg"

      - name: Integrate SUSFS
        if: ${{ inputs.use_susfs }}
        run: |
          cd kernel
          git clone --depth=1 "${{ env.SUSFS_URL }}" ../susfs
          
          KSU_DIR=$(find . -maxdepth 1 -type d -name "KernelSU*")
          if [ -z "$KSU_DIR" ]; then
            echo "::error::KernelSU source directory not found!"
            exit 1
          fi
          echo "Found KernelSU directory at: $KSU_DIR"
          
          cd "$KSU_DIR"

          echo "Applying SUSFS patch inside $KSU_DIR..."
          if [ -f "../../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" ]; then
            patch -p1 --forward --fuzz=3 < "../../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || {
              echo "::warning::SUSFS patch failed to apply. This might be expected for some KernelSU versions."
            }
          else
            echo "::warning::SUSFS patch file not found."
          fi

          cd ..

          if [ -d "../susfs/ksu_module_susfs" ]; then
            cp -r "../susfs/ksu_module_susfs" ./
          fi

      - name: Apply KPM
        if: ${{ inputs.use_kpm }}
        run: |
          cd kernel
          git clone --depth=1 "${{ env.KPM_URL }}" ../KPM
          
          if [ -f "../KPM/patch-kernel.sh" ]; then
            bash "../KPM/patch-kernel.sh" --apply
          else
            if [ -d "../KPM/patches" ]; then
              for patch in ../KPM/patches/*.patch; do
                [ -f "$patch" ] && git apply "$patch" || echo "Failed to apply $(basename "$patch")"
              done
            fi
          fi

      - name: Apply Additional Patches
        run: |
          cd kernel
          
          if [ "${{ inputs.use_lxc }}" == "true" ]; then
            if [ -f "../main/patches/lxc.patch" ]; then
              git apply "../main/patches/lxc.patch" || echo "LXC patch not available"
            fi
          fi
          
          if [ -d "../main/patches/core" ]; then
            for patch in ../main/patches/core/*.patch; do
              [ -f "$patch" ] && git apply "$patch" || echo "Failed to apply $(basename "$patch")"
            done
          fi

      - name: Configure Kernel Build Time/Version
        run: |
          cd kernel

          CURRENT_TIME=""
          if [ ! -z "${{ inputs.build_time }}" ]; then
            echo "Custom build time provided: ${{ inputs.build_time }}"
            CURRENT_TIME="${{ inputs.build_time }}"
          else
            echo "No custom build time provided, using current time."
            CURRENT_TIME=$(date -u +"%a %b %d %H:%M:%S UTC %Y")
          fi
          echo "Using build time: $CURRENT_TIME"

          # Set build time
          perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \\| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $CURRENT_TIME\"}" ./scripts/mkcompile_h
          sed -i "s/build-timestamp = \$(or \$(KBUILD_BUILD_TIMESTAMP), \$(build-timestamp-auto))/build-timestamp = \"$CURRENT_TIME\"/" ./init/Makefile
          
          # Set version string if provided
          if [ ! -z "${{ inputs.version }}" ]; then
            echo "Setting custom version string: ${{ inputs.version }}"
            echo "${{ inputs.version }}" > localversion.10
            sed -i 's/-dirty//' ./scripts/setlocalversion
          fi

      - name: Configure Kernel
        run: |
          cd kernel
          
          export PATH="${{ env.TOOLCHAIN_PATH }}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="spacealtctrl"
          export KBUILD_BUILD_HOST="GitHub-Actions"
          
          echo "Using defconfig: ${{ env.KERNEL_DEFCONFIG }}"
          make O=out LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} CROSS_COMPILE=${{ env.CLANG_TRIPLE }} ${{ env.KERNEL_DEFCONFIG }}
          
          if [ "${{ inputs.use_susfs }}" == "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_SU_HIDE=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> out/.config
          fi
          
          if [ "${{ inputs.use_lxc }}" == "true" ]; then
            echo "CONFIG_NAMESPACES=y" >> out/.config
            echo "CONFIG_NET_NS=y" >> out/.config
            echo "CONFIG_PID_NS=y" >> out/.config
            echo "CONFIG_IPC_NS=y" >> out/.config
            echo "CONFIG_UTS_NS=y" >> out/.config
            echo "CONFIG_CGROUPS=y" >> out/.config
            echo "CONFIG_CGROUP_DEVICE=y" >> out/.config
            echo "CONFIG_CPUSETS=y" >> out/.config
          fi

      - name: Build Kernel
        run: |
          cd kernel
          
          export PATH="${{ env.TOOLCHAIN_PATH }}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="spacealtctrl"
          export KBUILD_BUILD_HOST="GitHub-Actions"
          
          make O=out LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} CROSS_COMPILE=${{ env.CLANG_TRIPLE }} -j$(nproc) || {
            echo "Build failed"
            exit 1
          }

      - name: Package Kernel
        run: |
          git clone --depth=1 "${{ env.ANYKERNEL_URL }}" AnyKernel3
          cd AnyKernel3
          
          rm -rf .git* README.md modules patch ramdisk tools anykernel.sh
          cp ../kernel/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} ./
          
          # Dynamically create the anykernel.sh script
          cat > anykernel.sh <<- EOL
          # AnyKernel3 Script
          properties() { '
          kernel.string=KernelSU for ${{ env.DEVICE_FRIENDLY_NAME }} by spacealtctrl
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          ${{ env.ANYKERNEL_DEVICE_CHECKS }}
          supported.versions=${{ env.SUPPORTED_ANDROID_VERSIONS }}
          '; } # end properties
          
          block=boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          
          . tools/ak3-core.sh;
          
          dump_boot;
          write_boot;
          EOL
          
          VERSION_SUFFIX="${{ inputs.version }}"
          SUSFS_SUFFIX=""
          KPM_SUFFIX=""
          if [ "${{ inputs.use_susfs }}" == "true" ]; then SUSFS_SUFFIX="-SUSFS"; fi
          if [ "${{ inputs.use_kpm }}" == "true" ]; then KPM_SUFFIX="-KPM"; fi
          
          ZIP_NAME="Sony-${{ env.DEVICE_FRIENDLY_NAME }}-${{ inputs.kernelsu_variant }}${SUSFS_SUFFIX}${KPM_SUFFIX}${VERSION_SUFFIX:+-${VERSION_SUFFIX}}-$(date +'%Y%m%d').zip"
          zip -r9 "$ZIP_NAME" ./* -x ".git*" -x "README.md" -x "*.zip"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sony-${{ env.DEVICE_FRIENDLY_NAME }}-Kernel-${{ github.run_id }}
          path: |
            AnyKernel3/*.zip
            kernel/out/arch/arm64/boot/Image

  get-manager:
    name: Get Manager
    needs: build
    if: ${{ inputs.get_manager }}
    runs-on: ubuntu-latest
    steps:
      - name: Set Manager Repo
        run: |
          variant="${{ inputs.kernelsu_variant }}"
          case "$variant" in
            "Official") REPO="tiann/KernelSU" ;;
            "Next") REPO="rifsxd/KernelSU-Next" ;;
            "MKSU") REPO="5ec1cff/KernelSU" ;;
            "SukiSU"|"SukiSU-Ultra") REPO="SukiSue/SukiSU" ;;
          esac
          echo "KSU_REPO=$REPO" >> $GITHUB_ENV

      - name: Download Manager
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ env.KSU_REPO }}" ]; then
            gh release download -R "${{ env.KSU_REPO }}" -p "*.apk" --clobber || echo "No APK found"
          fi
          
      - name: Upload Manager
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Manager-APK-${{ inputs.kernelsu_variant }}
          path: "*.apk"

  download-susfs-module:
    name: Download SUSFS Module
    needs: build
    if: ${{ inputs.use_susfs }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Module
        run: |
          git clone --depth=1 "${{ env.SUSFS_MODULE_URL }}" susfs-module || {
            mkdir -p susfs-module
            cd susfs-module
            wget -q "https://github.com/sidex15/susfs4ksu_su_module/releases/latest/download/susfs4ksu_module.zip" -O susfs_module.zip || echo "No module found"
          }
          
          find susfs-module -name "*.zip" -exec cp {} ./ \; 2>/dev/null || echo "No zip files found"
          
      - name: Upload Module
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SUSFS-Module-${{ github.run_id }}
          path: "*.zip"
