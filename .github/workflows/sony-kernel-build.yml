# GitHub Actions Workflow for Building Sony Xperia Kernels
#
# This workflow is a more robust and reliable version, designed to address common build failures.
# Key Improvements:
# 1.  **Structural Change**: AnyKernel3 is now cloned at the beginning of the process, before the kernel build, to match the user's preferred workflow structure.
# 2.  **Corrected Permissions**: Includes the necessary permissions for the 'get-manager' job to download release assets.
# 3.  **Reliable Toolchain**: Uses a specific, well-tested pre-built Clang toolchain instead of relying on system packages.
# 4.  **Safer Kernel Configuration**: Modifies the kernel .config using the kernel's own scripts (`scripts/config`).

name: Build Sony Xperia Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: "Xperia Model"
        required: true
        type: choice
        options:
          - "Xperia 1 VI (pdx245)"
          - "Xperia 5 V (pdx237)"
          - "Xperia 1 V (pdx234)"
          - "Xperia 1 IV (pdx223)"
          - "Xperia 5 IV (pdx225)"
          - "Xperia PRO-I (pdx215)"
          - "Xperia 1 III (pdx213)"
          - "Xperia 5 III (pdx214)"
          - "Xperia 1 II (pdx203)"
          - "Xperia 5 II (pdx206)"
        default: "Xperia 1 V (pdx234)"
      kernelsu_variant:
        description: "KernelSU Variant"
        required: true
        type: choice
        options: ["Official", "Next", "MKSU", "SukiSU", "SukiSU-Ultra"]
        default: "SukiSU-Ultra"
      kernelsu_branch:
        description: "KernelSU Branch (main/stable or dev/next)"
        required: true
        type: choice
        options: ["Stable", "Dev"]
        default: "Dev"
      version:
        description: "Version Suffix (optional)"
        required: false
        type: string
      use_susfs:
        description: "Enable SUSFS? (Hides root)"
        required: true
        type: boolean
        default: true
      use_kpm:
        description: "Enable KPM? (Kernel Patch Manager)"
        required: true
        type: boolean
        default: true
      use_lxc:
        description: "Enable LXC? (Linux Containers)"
        required: true
        type: boolean
        default: false
      get_manager:
        description: "Download Manager APK?"
        required: true
        type: boolean
        default: true

env:
  SONY_KERNEL_URL: "https://github.com/sonyxperiadev/kernel.git"
  ANYKERNEL_URL: "https://github.com/osm0sis/AnyKernel3.git"
  KPM_URL: "https://github.com/backslashxx/KPM.git"
  SUSFS_URL: "https://gitlab.com/simonpunk/susfs4ksu.git"
  SUSFS_MODULE_URL: "https://github.com/sidex15/susfs4ksu_su_module.git"
  KERNEL_IMAGE_NAME: "Image"
  KBUILD_BUILD_USER: "spacealtctrl"
  KBUILD_BUILD_HOST: "GitHub-Actions"
  ARCH: arm64
  SUBARCH: arm64

jobs:
  build:
    name: "Build Kernel"
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev cpio \
            unzip wget kmod dwarves python3

      - name: Configure Git
        run: |
          git config --global user.name "${{ env.KBUILD_BUILD_USER }}"
          git config --global user.email "actions@github.com"

      - name: Set Device-Specific Variables
        run: |
          case "${{ inputs.device }}" in
            "Xperia 1 VI (pdx245)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1VI" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx245_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx245" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=14" >> $GITHUB_ENV
              echo "PDX_MODEL=245" >> $GITHUB_ENV
              ;;
            "Xperia 5 V (pdx237)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-5V" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx237_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx237" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=13-14" >> $GITHUB_ENV
              echo "PDX_MODEL=237" >> $GITHUB_ENV
              ;;
            "Xperia 1 V (pdx234)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1V" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx234_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx234" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=13-14" >> $GITHUB_ENV
              echo "PDX_MODEL=234" >> $GITHUB_ENV
              ;;
            "Xperia 1 IV (pdx223)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1IV" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx223_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx223" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=12-13" >> $GITHUB_ENV
              echo "PDX_MODEL=223" >> $GITHUB_ENV
              ;;
            "Xperia 5 IV (pdx225)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-5IV" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx225_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx225" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=12-13" >> $GITHUB_ENV
              echo "PDX_MODEL=225" >> $GITHUB_ENV
              ;;
            "Xperia PRO-I (pdx215)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-PRO-I" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx215_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx215" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=11-12" >> $GITHUB_ENV
              echo "PDX_MODEL=215" >> $GITHUB_ENV
              ;;
            "Xperia 1 III (pdx213)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1III" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx213_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx213" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=11-12" >> $GITHUB_ENV
              echo "PDX_MODEL=213" >> $GITHUB_ENV
              ;;
            "Xperia 5 III (pdx214)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-5III" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx214_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx214" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=11-12" >> $GITHUB_ENV
              echo "PDX_MODEL=214" >> $GITHUB_ENV
              ;;
            "Xperia 1 II (pdx203)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1II" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx203_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx203" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=10-11" >> $GITHUB_ENV
              echo "PDX_MODEL=203" >> $GITHUB_ENV
              ;;
            "Xperia 5 II (pdx206)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-5II" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx206_defconfig" >> $GITHUB_ENV
              echo "ANYKERNEL_DEVICE_CHECKS=device.name1=pdx206" >> $GITHUB_ENV
              echo "SUPPORTED_ANDROID_VERSIONS=10-11" >> $GITHUB_ENV
              echo "PDX_MODEL=206" >> $GITHUB_ENV
              ;;
          esac

      - name: Setup Clang Toolchain
        run: |
          echo "Setting up ZyC Clang toolchain..."
          git clone --depth=1 https://github.com/ZyCromer/Clang-19.git clang-toolchain
          echo "CLANG_PATH=$(pwd)/clang-toolchain/bin" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          
      - name: Clone Kernel Source
        run: |
          echo "Cloning Sony kernel..."
          git clone --depth=1 "${{ env.SONY_KERNEL_URL }}" kernel
          echo "KERNEL_PATH=$(pwd)/kernel" >> $GITHUB_ENV

      - name: Clone AnyKernel3
        run: |
          echo "Cloning AnyKernel3..."
          git clone --depth=1 "${{ env.ANYKERNEL_URL }}" AnyKernel3

      - name: Integrate KernelSU
        run: |
          cd ${{ env.KERNEL_PATH }}

          ksu_branch_arg="main"
          if [[ "${{ inputs.kernelsu_branch }}" == "Dev" ]]; then
            ksu_branch_arg="dev"
          fi

          setup_script_url=""
          case "${{ inputs.kernelsu_variant }}" in
            "Official") setup_script_url="https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" ;;
            "Next") setup_script_url="https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" ;;
            "MKSU") setup_script_url="https://raw.githubusercontent.com/5ec1cff/KernelSU/main/kernel/setup.sh" ;;
            "SukiSU"|"SukiSU-Ultra") setup_script_url="https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" ;;
          esac
          
          if [ -z "$setup_script_url" ]; then
            echo "::error::Invalid KernelSU variant selected."
            exit 1
          fi

          echo "Integrating ${{ inputs.kernelsu_variant }} using branch '$ksu_branch_arg'..."
          curl -LSs "$setup_script_url" | bash -s "$ksu_branch_arg"

      - name: Integrate SUSFS
        if: ${{ inputs.use_susfs }}
        run: |
          cd ${{ env.KERNEL_PATH }}
          git clone --depth=1 "${{ env.SUSFS_URL }}" ../susfs
          
          KSU_DIR=$(find . -maxdepth 1 -type d -name "KernelSU*")
          if [ -z "$KSU_DIR" ]; then
            echo "::error::KernelSU source directory not found!"
            exit 1
          fi
          
          cd "$KSU_DIR"
          echo "Applying SUSFS patch inside $KSU_DIR..."
          patch_file="../../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
          if [ -f "$patch_file" ]; then
            patch -p1 --forward --fuzz=3 < "$patch_file" || echo "::warning::SUSFS patch failed to apply. This might be expected."
          else
            echo "::warning::SUSFS patch file not found."
          fi
          cd ..
          
          if [ -d "../susfs/ksu_module_susfs" ]; then
            cp -r "../susfs/ksu_module_susfs" ./
          fi

      - name: Apply KPM
        if: ${{ inputs.use_kpm }}
        run: |
          cd ${{ env.KERNEL_PATH }}
          git clone --depth=1 "${{ env.KPM_URL }}" ../KPM
          
          if [ -f "../KPM/patch-kernel.sh" ]; then
            bash "../KPM/patch-kernel.sh" --apply
          elif [ -d "../KPM/patches" ]; then
            for patch in ../KPM/patches/*.patch; do
              [ -f "$patch" ] && git apply "$patch" || echo "::warning::Failed to apply KPM patch $(basename "$patch")"
            done
          fi

      - name: Apply Additional Patches
        run: |
          cd ${{ env.KERNEL_PATH }}
          
          if [ "${{ inputs.use_lxc }}" == "true" ] && [ -f "../main/patches/lxc.patch" ]; then
            echo "Applying LXC patch..."
            git apply "../main/patches/lxc.patch" || echo "::warning::LXC patch failed to apply."
          fi
          
          if [ -d "../main/patches/core" ]; then
            echo "Applying core patches..."
            for patch in ../main/patches/core/*.patch; do
              if [ -f "$patch" ]; then
                git apply "$patch" || echo "::warning::Failed to apply core patch $(basename "$patch")"
              fi
            done
          fi

      - name: Configure Kernel
        run: |
          cd ${{ env.KERNEL_PATH }}
          
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          
          DEFCONFIG_PATH="arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}"
          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "::warning::Defconfig '${{ env.KERNEL_DEFCONFIG }}' not found. Searching for alternatives..."
            FOUND_CONFIG=$(find arch/arm64/configs/ -name "*pdx${{ env.PDX_MODEL }}*.defconfig" -o -name "*yodo*.defconfig" -o -name "*nagara*.defconfig" | head -n 1)
            if [ -z "$FOUND_CONFIG" ]; then
              FOUND_CONFIG=$(find arch/arm64/configs/ -name "gki_defconfig" | head -n 1)
            fi
            if [ -z "$FOUND_CONFIG" ]; then
              FOUND_CONFIG=$(find arch/arm64/configs/ -name "defconfig" | head -n 1)
            fi

            if [ -n "$FOUND_CONFIG" ]; then
              echo "Found alternative config: $FOUND_CONFIG"
              echo "KERNEL_DEFCONFIG=$(basename $FOUND_CONFIG)" >> $GITHUB_ENV
            else
              echo "::error::No suitable defconfig could be found!"
              exit 1
            fi
          fi

          echo "Using defconfig: ${{ env.KERNEL_DEFCONFIG }}"
          
          make O=out LLVM=1 "${{ env.KERNEL_DEFCONFIG }}"

          echo "Enabling additional kernel features..."
          cd out
          
          if [ "${{ inputs.use_susfs }}" == "true" ]; then
            ../../scripts/config --enable CONFIG_KSU_SUSFS
            ../../scripts/config --enable CONFIG_KSU_SUSFS_SU_HIDE
          fi

          if [ "${{ inputs.use_lxc }}" == "true" ]; then
            ../../scripts/config --enable CONFIG_NAMESPACES
            ../../scripts/config --enable CONFIG_NET_NS
            ../../scripts/config --enable CONFIG_PID_NS
            ../../scripts/config --enable CONFIG_IPC_NS
            ../../scripts/config --enable CONFIG_UTS_NS
            ../../scripts/config --enable CONFIG_CGROUPS
            ../../scripts/config --enable CONFIG_CGROUP_DEVICE
            ../../scripts/config --enable CONFIG_CPUSETS
          fi

          cd ..
          
          make O=out LLVM=1 olddefconfig

      - name: Build Kernel
        run: |
          cd ${{ env.KERNEL_PATH }}
          
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          
          echo "Starting kernel build..."
          make O=out LLVM=1 -j$(nproc) || {
            echo "::error::Kernel build failed. Check the log for compiler errors."
            exit 1
          }
          echo "Kernel build successful."

      - name: Package Kernel
        run: |
          KERNEL_IMAGE_PATH="${{ env.KERNEL_PATH }}/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }}"
          if [ ! -f "$KERNEL_IMAGE_PATH" ]; then
            echo "::error::Kernel image not found at $KERNEL_IMAGE_PATH! Packaging failed."
            exit 1
          fi

          cd AnyKernel3
          
          cp "$KERNEL_IMAGE_PATH" ./
          
          cat > anykernel.sh <<- EOL
# AnyKernel3 Script
properties() { '
kernel.string=KernelSU for ${{ env.DEVICE_FRIENDLY_NAME }} by ${{ env.KBUILD_BUILD_USER }}
do.devicecheck=1
do.modules=0
do.systemless=1
do.cleanup=1
do.cleanuponabort=0
${{ env.ANYKERNEL_DEVICE_CHECKS }}
supported.versions=${{ env.SUPPORTED_ANDROID_VERSIONS }}
'; } # end properties

block=boot;
is_slot_device=1;
ramdisk_compression=auto;
patch_vbmeta_flag=auto;

. tools/ak3-core.sh;

dump_boot;
write_boot;
EOL
          
          VERSION_SUFFIX="${{ inputs.version }}"
          SUSFS_SUFFIX=$([ "${{ inputs.use_susfs }}" == "true" ] && echo "-SUSFS" || echo "")
          KPM_SUFFIX=$([ "${{ inputs.use_kpm }}" == "true" ] && echo "-KPM" || echo "")
          
          ZIP_NAME="Sony-${{ env.DEVICE_FRIENDLY_NAME }}-${{ inputs.kernelsu_variant }}${SUSFS_SUFFIX}${KPM_SUFFIX}${VERSION_SUFFIX:+-${VERSION_SUFFIX}}-$(date +'%Y%m%d').zip"
          
          zip -r9 "$ZIP_NAME" ./* -x ".git*" -x "README.md" -x "*.zip"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sony-${{ env.DEVICE_FRIENDLY_NAME }}-Kernel-${{ github.run_id }}
          path: |
            AnyKernel3/*.zip
            ${{ env.KERNEL_PATH }}/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }}

  get-manager:
    name: Get Manager
    needs: build
    if: ${{ inputs.get_manager }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set Manager Repo
        run: |
          variant="${{ inputs.kernelsu_variant }}"
          case "$variant" in
            "Official") REPO="tiann/KernelSU" ;;
            "Next") REPO="rifsxd/KernelSU-Next" ;;
            "MKSU") REPO="5ec1cff/KernelSU" ;;
            "SukiSU"|"SukiSU-Ultra") REPO="SukiSue/SukiSU" ;;
          esac
          echo "KSU_REPO=$REPO" >> $GITHUB_ENV

      - name: Download Manager
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ env.KSU_REPO }}" ]; then
            gh release download -R "${{ env.KSU_REPO }}" -p "*.apk" --clobber || echo "No APK found for ${{ env.KSU_REPO }}"
          fi
          
      - name: Upload Manager
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Manager-APK-${{ inputs.kernelsu_variant }}
          path: "*.apk"

  download-susfs-module:
    name: Download SUSFS Module
    needs: build
    if: ${{ inputs.use_susfs }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Module
        run: |
          git clone --depth=1 "${{ env.SUSFS_MODULE_URL }}" susfs-module || \
          wget -q "https://github.com/sidex15/susfs4ksu_su_module/releases/latest/download/susfs4ksu_module.zip" -O susfs-module.zip
          
          find . -name "*.zip" -exec mv {} ./susfs_module.zip \; 2>/dev/null || echo "No zip file found."
          
      - name: Upload Module
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SUSFS-Module-${{ github.run_id }}
          path: "susfs_module.zip"
