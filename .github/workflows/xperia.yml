# .github/workflows/build-kernel.yml
# A single, all-in-one workflow for building a kernel for a chosen Xperia device from your forked repository.

name: Build Xperia Kernel

on:
  workflow_dispatch:
    inputs:
      device_choice:
        description: 'Select the Xperia device to build for'
        required: true
        type: choice
        options:
          - "Xperia 1 VI (pdx245)"
          - "Xperia 10 VI (pdx246)"
          - "Xperia 5 V (pdx237)"
          - "Xperia 1 V (pdx234)"
          - "Xperia 10 V (pdx235)"
          - "Xperia 1 IV (pdx223)"
          - "Xperia 5 IV (pdx224)"
          - "Xperia 10 IV (pdx225)"
          - "Xperia PRO-I (pdx215)"
          - "Xperia 1 III (pdx215)"
          - "Xperia 5 III (pdx214)"
          - "Xperia 10 III (pdx213)"
          - "Xperia 1 II (pdx203)"
          - "Xperia 5 II (pdx206)"
          - "Xperia 10 II (pdx201)"
      kernel_branch:
        description: 'Kernel branch to build from'
        required: true
        type: string
        default: 'aosp/LA.UM.9.14.r1'

jobs:
  build:
    name: Build for ${{ inputs.device_choice }}
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential ccache curl git libssl-dev lzop make zip

      - name: Set up Defconfig Mapping
        id: map_defconfig
        run: |
          # This step maps the user-friendly name to the technical defconfig filename.
          # The result is saved to a GitHub environment variable for later use.
          case "${{ inputs.device_choice }}" in
            "Xperia 1 VI (pdx245)")   echo "DEFCONFIG=aosp_pdx245_defconfig" >> $GITHUB_ENV ;;
            "Xperia 10 VI (pdx246)")  echo "DEFCONFIG=aosp_pdx246_defconfig" >> $GITHUB_ENV ;;
            "Xperia 5 V (pdx237)")   echo "DEFCONFIG=aosp_pdx237_defconfig" >> $GITHUB_ENV ;;
            "Xperia 1 V (pdx234)")   echo "DEFCONFIG=aosp_pdx234_defconfig" >> $GITHUB_ENV ;;
            "Xperia 10 V (pdx235)")  echo "DEFCONFIG=aosp_pdx235_defconfig" >> $GITHUB_ENV ;;
            "Xperia 1 IV (pdx223)")   echo "DEFCONFIG=aosp_pdx223_defconfig" >> $GITHUB_ENV ;;
            "Xperia 5 IV (pdx224)")   echo "DEFCONFIG=aosp_pdx224_defconfig" >> $GITHUB_ENV ;;
            "Xperia 10 IV (pdx225)")  echo "DEFCONFIG=aosp_pdx225_defconfig" >> $GITHUB_ENV ;;
            "Xperia PRO-I (pdx215)")  echo "DEFCONFIG=aosp_pdx215_defconfig" >> $GITHUB_ENV ;;
            "Xperia 1 III (pdx215)")  echo "DEFCONFIG=aosp_pdx215_defconfig" >> $GITHUB_ENV ;;
            "Xperia 5 III (pdx214)")  echo "DEFCONFIG=aosp_pdx214_defconfig" >> $GITHUB_ENV ;;
            "Xperia 10 III (pdx213)") echo "DEFCONFIG=aosp_pdx213_defconfig" >> $GITHUB_ENV ;;
            "Xperia 1 II (pdx203)")   echo "DEFCONFIG=aosp_pdx203_defconfig" >> $GITHUB_ENV ;;
            "Xperia 5 II (pdx206)")   echo "DEFCONFIG=aosp_pdx206_defconfig" >> $GITHUB_ENV ;;
            "Xperia 10 II (pdx201)")  echo "DEFCONFIG=aosp_pdx201_defconfig" >> $GITHUB_ENV ;;
            *) echo "Invalid device selected"; exit 1 ;;
          esac

      - name: Cache AOSP Clang Toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: ${{ runner.os }}-aosp-clang-r510928

      - name: Setup Toolchain (AOSP Clang)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          echo "Toolchain cache not found. Cloning AOSP Clang..."
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/clang-r510928/ toolchain

      - name: Setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache -M 5G
          ccache -z

      - name: Cache ccache directory
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ env.DEFCONFIG }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.DEFCONFIG }}-

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: spacealtctrl/xperia_kernel_build
          ref: ${{ inputs.kernel_branch }}
          path: kernel-source
          fetch-depth: 1

      - name: Compile Kernel
        working-directory: ./kernel-source
        run: |
          # Set environment variables for the Kbuild system.
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export PATH="${GITHUB_WORKSPACE}/toolchain/bin:${PATH}"
          
          echo "================================================="
          echo "Starting build for: ${{ env.DEFCONFIG }}"
          echo "================================================="
          
          # Configure the kernel using the selected defconfig.
          # O=out redirects all build output to a subdirectory.
          # LLVM=1 tells Kbuild to use the full LLVM toolchain.
          # LLVM_IAS=1 tells Kbuild to use the LLVM integrated assembler.
          make LLVM=1 LLVM_IAS=1 O=out ${{ env.DEFCONFIG }}
          
          # Start the compilation process using ccache for acceleration.
          make LLVM=1 LLVM_IAS=1 O=out CC="ccache clang" -j$(nproc)
          
          echo "================================================="
          echo "ccache statistics:"
          ccache -s
          echo "================================================="

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.DEFCONFIG }}-${{ github.run_id }}
          path: ./kernel-source/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: error
