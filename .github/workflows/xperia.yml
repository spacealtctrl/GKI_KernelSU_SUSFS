name: Build Sony Xperia 1V Enhanced Kernel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 'Kernel Source'
        required: false
        default: 'https://android.googlesource.com/kernel/common'
        type: string
      kernel_source_branch:
        description: 'Branch'
        required: false
        default: 'android13-5.15-lts'
        type: string
      kernel_defconfig:
        description: 'Defconfig'
        required: false
        default: 'gki_defconfig'
        type: string
      enable_ksu:
        description: 'Enable KernelSU'
        required: false
        default: true
        type: boolean
      enable_susfs:
        description: 'Enable SUSFS'
        required: false
        default: true
        type: boolean
      enable_xperia_enhancements:
        description: 'Enable Xperia 1V Specific Enhancements'
        required: false
        default: true
        type: boolean
      build_lkm:
        description: 'Build loadable kernel modules'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build Sony Xperia 1V Enhanced Kernel
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_BASEDIR: "$GITHUB_WORKSPACE"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev \
          libudev-dev libpci-dev libiberty-dev autoconf device-tree-compiler \
          ccache git python3-pip ninja-build curl wget

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ github.run_id }}
        restore-keys: |
          build-kernel-

    - name: Setup Clang
      run: |
        mkdir clang
        cd clang
        wget -O clang.tar.gz https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz
        tar -xzf clang.tar.gz
        echo "$(pwd)/bin" >> $GITHUB_PATH

    - name: Get kernel source
      run: |
        git clone --depth=1 --single-branch --branch ${{ github.event.inputs.kernel_source_branch || 'android13-5.15-lts' }} \
          ${{ github.event.inputs.kernel_source || 'https://android.googlesource.com/kernel/common' }} kernel-source
        cd kernel-source
        echo "KERNEL_VERSION=$(make kernelversion)" >> $GITHUB_ENV

    - name: Setup KernelSU
      if: ${{ github.event.inputs.enable_ksu != 'false' }}
      run: |
        cd kernel-source
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
        echo "CONFIG_KPROBES=y" >> arch/arm64/configs/${{ github.event.inputs.kernel_defconfig || 'gki_defconfig' }}

    - name: Setup SUSFS
      if: ${{ github.event.inputs.enable_susfs != 'false' }}
      run: |
        cd kernel-source
        git clone https://gitlab.com/simonpunk/susfs4ksu.git drivers/susfs
        
        # Add SUSFS to Kconfig and Makefile
        echo "source \"drivers/susfs/Kconfig\"" >> drivers/Kconfig
        echo "obj-\$(CONFIG_SUSFS) += susfs/" >> drivers/Makefile
        
        # Enable SUSFS in config
        cat >> arch/arm64/configs/${{ github.event.inputs.kernel_defconfig || 'gki_defconfig' }} << EOF
        CONFIG_SUSFS=y
        CONFIG_SUSFS_OPEN_REDIRECT=y
        CONFIG_SUSFS_SUS_PATH=y
        CONFIG_SUSFS_SUS_MOUNT=y
        CONFIG_SUSFS_SUS_KSTAT=y
        CONFIG_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_PATH=y
        EOF

    - name: Apply Sony Xperia 1V Enhancements
      if: ${{ github.event.inputs.enable_xperia_enhancements != 'false' }}
      run: |
        cd kernel-source
        
        # Create enhancement patches directory
        mkdir -p xperia_enhancements
        
        # Thermal Management Improvements
        cat > xperia_enhancements/thermal_mgmt.patch << 'EOF'
        --- a/drivers/thermal/thermal_core.c
        +++ b/drivers/thermal/thermal_core.c
        @@ -500,7 +500,7 @@ static void handle_thermal_trip(struct thermal_zone_device *tz,
         		return;
         	}
         
        -	if (tz->temperature >= trip->temperature) {
        +	if (tz->temperature >= (trip->temperature + 5000)) {  /* Add 5C hysteresis for Xperia */
         		/*
         		 * The trip temperature has been crossed on the way up.
         		 */
        @@ -520,7 +520,7 @@ static void handle_thermal_trip(struct thermal_zone_device *tz,
         		if (trip->type == THERMAL_TRIP_CRITICAL)
         			return;
         
        -	} else if (tz->last_temperature >= trip->temperature &&
        +	} else if (tz->last_temperature >= (trip->temperature + 3000) &&  /* Optimized cooling */
         		   tz->temperature < trip->temperature - trip->hysteresis) {
         		/*
         		 * The trip temperature has been crossed on the way down.
        EOF
        
        # Camera Optimizations
        cat > xperia_enhancements/camera_opt.patch << 'EOF'
        --- a/drivers/media/platform/msm/camera/cam_req_mgr/cam_req_mgr_dev.c
        +++ b/drivers/media/platform/msm/camera/cam_req_mgr/cam_req_mgr_dev.c
        @@ -50,6 +50,11 @@ static long cam_req_mgr_dev_ioctl(struct file *file, unsigned int cmd,
         {
         	int rc = 0;
         	
        +	/* Sony Xperia optimized camera scheduling */
        +	if (current->policy != SCHED_FIFO && current->rt_priority < 10) {
        +		struct sched_param param = { .sched_priority = 10 };
        +		sched_setscheduler(current, SCHED_FIFO, &param);
        +	}
         	switch (cmd) {
         	case CAM_REQ_MGR_CREATE_SESSION: {
         		struct cam_req_mgr_session_info session_info;
        EOF
        
        # Display Enhancements for 4K 120Hz
        cat > xperia_enhancements/display_opt.patch << 'EOF'
        --- a/drivers/gpu/drm/msm/dsi/dsi_host.c
        +++ b/drivers/gpu/drm/msm/dsi/dsi_host.c
        @@ -2500,6 +2500,12 @@ int msm_dsi_host_init(struct msm_dsi *msm_dsi)
         	msm_host->dev = dev;
         	msm_host->id = id;
         	
        +	/* Sony Xperia 1V specific display optimizations */
        +	if (of_device_is_compatible(dev->of_node, "qcom,dsi-ctrl-6g-core-v2-4-0")) {
        +		/* Enable high refresh rate optimization */
        +		msm_host->refresh_rate_optimization = true;
        +		msm_host->max_refresh_rate = 120;
        +	}
         	platform_set_drvdata(pdev, msm_host);
         	
         	/* Get DSI regulators */
        EOF
        
        # Audio Improvements
        cat > xperia_enhancements/audio_opt.patch << 'EOF'
        --- a/sound/soc/codecs/wcd938x.c
        +++ b/sound/soc/codecs/wcd938x.c
        @@ -4500,6 +4500,11 @@ static int wcd938x_probe(struct snd_soc_component *component)
         	wcd938x->component = component;
         	snd_soc_component_init_regmap(component, wcd938x->regmap);
         	
        +	/* Sony Xperia audio enhancements */
        +	regmap_update_bits(wcd938x->regmap, WCD938X_HPH_NEW_INT_HPH_TIMER1,
        +			   WCD938X_HPH_NEW_INT_HPH_TIMER1_AUTOCHOP_TIMER_EN_MASK,
        +			   WCD938X_HPH_NEW_INT_HPH_TIMER1_AUTOCHOP_TIMER_EN_MASK);
        +			   
         	/* Set all interrupts as edge triggered */
         	for (i = 0; i < wcd938x_regmap_irq_chip.num_regs; i++) {
         		regmap_write(wcd938x->regmap,
        EOF
        
        # Gaming Performance Tweaks - GPU Governor
        cat > xperia_enhancements/gaming_gpu.patch << 'EOF'
        --- a/drivers/gpu/msm/kgsl_pwrctrl.c
        +++ b/drivers/gpu/msm/kgsl_pwrctrl.c
        @@ -2800,6 +2800,15 @@ static void kgsl_pwrctrl_set_state(struct kgsl_device *device,
         		if (device->state == KGSL_STATE_ACTIVE) {
         			kgsl_pwrctrl_pwrlevel_change(device,
         					pwr->default_pwrlevel);
        +			
        +			/* Sony Xperia gaming mode detection */
        +			if (strstr(current->comm, "game") || 
        +			    strstr(current->comm, "unity") ||
        +			    strstr(current->comm, "unreal")) {
        +				/* Set higher performance for gaming */
        +				kgsl_pwrctrl_pwrlevel_change(device, 0);
        +				pwr->thermal_timeout = jiffies + msecs_to_jiffies(30000);
        +			}
         		}
         		kgsl_pwrctrl_set_thermal_cycle(pwr, interval);
         		kgsl_pwrctrl_set_constraint(device, &device->pwrctrl,
        EOF
        
        # Apply all patches
        for patch in xperia_enhancements/*.patch; do
          echo "Applying $(basename $patch)..."
          patch -p1 < "$patch" || echo "Warning: $(basename $patch) failed to apply cleanly"
        done
        
        # Add Xperia-specific kernel configurations
        cat >> arch/arm64/configs/${{ github.event.inputs.kernel_defconfig || 'gki_defconfig' }} << EOF
        
        # Sony Xperia 1V Specific Optimizations
        CONFIG_THERMAL_GOV_USER_SPACE=y
        CONFIG_THERMAL_GOV_LOW_LIMITS=y
        CONFIG_LIMITS_MONITOR=y
        CONFIG_LIMITS_LITE_HW=y
        
        # Camera optimizations
        CONFIG_MEDIA_CAMERA_SUPPORT=y
        CONFIG_VIDEO_V4L2_SUBDEV_API=y
        CONFIG_VIDEOBUF2_CORE=y
        
        # Display optimizations  
        CONFIG_FB_MSM_MDSS=y
        CONFIG_FB_MSM_MDSS_DSI_CTRL_STATUS=y
        CONFIG_FB_MSM_MDSS_MDP3=y
        
        # Audio enhancements
        CONFIG_SND_SOC_WCD938X=y
        CONFIG_SND_SOC_WCD938X_SLAVE=y
        CONFIG_AUDIO_EXT_CLK=y
        
        # Gaming performance
        CONFIG_MSM_KGSL=y
        CONFIG_MSM_ADRENO_TZ=y
        CONFIG_MSM_ADRENO_DEFAULT_GOVERNOR="msm-adreno-tz"
        
        # Performance governors
        CONFIG_CPU_FREQ_GOV_INTERACTIVE=y
        CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y
        CONFIG_CPU_FREQ_GOV_ONDEMAND=y
        CONFIG_CPU_FREQ_GOV_POWERSAVE=y
        CONFIG_CPU_FREQ_GOV_USERSPACE=y
        CONFIG_CPU_FREQ_GOV_PERFORMANCE=y
        
        # I/O Schedulers
        CONFIG_IOSCHED_DEADLINE=y
        CONFIG_IOSCHED_CFQ=y
        CONFIG_DEFAULT_DEADLINE=y
        
        # Memory optimizations
        CONFIG_ZRAM=y
        CONFIG_ZRAM_DEF_COMP_LZORLE=y
        CONFIG_LZ4_COMPRESS=y
        CONFIG_LZ4_DECOMPRESS=y
        
        # Security enhancements
        CONFIG_SECURITY_SELINUX_DEVELOP=y
        CONFIG_SECURITY_SELINUX_AVC_STATS=y
        
        # Network optimizations
        CONFIG_TCP_CONG_BBR=y
        CONFIG_DEFAULT_TCP_CONG="bbr"
        
        # Battery optimizations
        CONFIG_POWERSUSPEND=y
        CONFIG_CPU_INPUT_BOOST=y
        
        # Remove debugging overhead
        # CONFIG_DEBUG_INFO is not set
        # CONFIG_KASAN is not set
        # CONFIG_UBSAN is not set
        # CONFIG_SLUB_DEBUG is not set
        EOF

    - name: Build kernel
      run: |
        cd kernel-source
        export PATH="/usr/lib/ccache:$PATH"
        export KBUILD_BUILD_HOST=GitHub-Actions
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        
        make -j$(nproc --all) CC="ccache clang" \
          ARCH=arm64 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          O=out \
          ${{ github.event.inputs.kernel_defconfig || 'gki_defconfig' }}
          
        make -j$(nproc --all) CC="ccache clang" \
          ARCH=arm64 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          O=out \
          Image.gz dtb
          
        if [ "${{ github.event.inputs.build_lkm }}" = "true" ]; then
          make -j$(nproc --all) CC="ccache clang" \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            O=out \
            modules
        fi

    - name: Build AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git ak3
        cd ak3
        
        # Configure AnyKernel3 for Sony Xperia 1 V
        cat > anykernel.sh << 'EOF'
        # AnyKernel3 Ramdisk Mod Script
        # osm0sis @ xda-developers
        
        ## AnyKernel setup
        # begin properties
        properties() { '
        kernel.string=Sony Xperia 1V Enhanced Kernel by ${{ github.actor }}
        do.devicecheck=1
        do.modules=0
        do.systemless=1
        do.cleanup=1
        do.cleanuponabort=0
        device.name1=XQ-DQ54
        device.name2=XQ-DQ62
        device.name3=XQ-DQ72
        device.name4=pdx234
        device.name5=
        supported.versions=13
        supported.patchlevels=
        '; } # end properties
        
        # shell variables
        block=/dev/block/by-name/boot;
        is_slot_device=1;
        ramdisk_compression=auto;
        patch_vbmeta_flag=auto;
        
        ## AnyKernel methods (DO NOT CHANGE)
        # import patching functions/variables - see for reference
        . tools/ak3-core.sh;
        
        ## AnyKernel file attributes
        # set permissions/ownership for included ramdisk files
        set_perm_recursive 0 0 755 644 $ramdisk/*;
        set_perm_recursive 0 0 750 750 $ramdisk/init* $ramdisk/sbin;
        
        ## AnyKernel install
        dump_boot;
        
        # begin ramdisk changes
        
        # Sony Xperia specific optimizations
        if [ -f $ramdisk/init.sony.rc ]; then
          # Add thermal optimizations
          insert_line $ramdisk/init.sony.rc "on boot" $ramdisk/init.sony.rc "    write /sys/class/thermal/thermal_zone0/mode disabled"
          insert_line $ramdisk/init.sony.rc "on boot" $ramdisk/init.sony.rc "    write /sys/class/thermal/thermal_zone1/mode disabled"
          
          # Audio optimizations  
          insert_line $ramdisk/init.sony.rc "on boot" $ramdisk/init.sony.rc "    write /proc/sys/kernel/sched_boost 1"
          
          # Display optimizations
          insert_line $ramdisk/init.sony.rc "on boot" $ramdisk/init.sony.rc "    write /sys/class/graphics/fb0/dynamic_fps 1"
        fi;
        
        # end ramdisk changes
        
        write_boot;
        ## end install
        EOF
        
        cp ../kernel-source/out/arch/arm64/boot/Image.gz .
        if [ -f ../kernel-source/out/arch/arm64/boot/dtb ]; then
          cp ../kernel-source/out/arch/arm64/boot/dtb .
        fi
        
        # Create flashable zip
        zip -r9 "../Sony-Xperia-1V-Enhanced-Kernel-${{ env.KERNEL_VERSION }}-$(date +%Y%m%d-%H%M).zip" \
          * -x .git README.md *placeholder

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: Sony-Xperia-1V-Enhanced-Kernel-Image
        path: kernel-source/out/arch/arm64/boot/Image.gz
        retention-days: 30

    - name: Upload AnyKernel3 zip
      uses: actions/upload-artifact@v4  
      with:
        name: Sony-Xperia-1V-Enhanced-Kernel-Flash
        path: "*.zip"
        retention-days: 30

    - name: Upload modules (if built)
      if: ${{ github.event.inputs.build_lkm == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: Sony-Xperia-1V-Enhanced-Kernel-Modules
        path: kernel-source/out/**/*.ko
        retention-days: 30

    - name: Build summary
      run: |
        cd kernel-source
        echo "## Build Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel Version:** ${{ env.KERNEL_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Device:** Sony Xperia 1 V" >> $GITHUB_STEP_SUMMARY
        echo "- **KernelSU:** ${{ github.event.inputs.enable_ksu }}" >> $GITHUB_STEP_SUMMARY
        echo "- **SUSFS:** ${{ github.event.inputs.enable_susfs }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Xperia Enhancements:** ${{ github.event.inputs.enable_xperia_enhancements }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Enhanced Features:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Thermal Management Improvements" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Camera Optimizations" >> $GITHUB_STEP_SUMMARY  
        echo "- ✅ 4K 120Hz Display Enhancements" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Audio Processing Improvements" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Gaming Performance Tweaks" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Advanced CPU/GPU Governors" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Memory & I/O Optimizations" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Network & Battery Optimizations" >> $GITHUB_STEP_SUMMARY
