name: Build Sony Xperia Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: "Xperia Model"
        required: true
        type: choice
        options:
          - "Xperia 1 VI / 5 V (SM8650/SM8550)"
          - "Xperia 1 V (SM8550)"
          - "Xperia 1 IV / 5 IV (SM8450)"
          - "Xperia PRO-I / 1 III / 5 III (SM8350)"
          - "Xperia 1 II / 5 II (SM8250)"
          - "Xperia 1 / 5 (SM8150)"
          - "Xperia XZ3 (SDM845)"
          - "Xperia XZ2 / XZ2 Premium / XZ2 Compact (SDM845)"
        default: "Xperia 1 VI / 5 V (SM8650/SM8550)"
      android_version:
        description: "Android Version"
        required: true
        type: choice
        options: ["android13", "android14"]
        default: "android14"
      kernelsu_variant:
        description: "KernelSU Variant"
        required: true
        type: choice
        options: ["Official", "Next", "MKSU", "SukiSU", "SukiSU-Ultra"]
        default: "SukiSU-Ultra"
      kernelsu_branch:
        description: "KernelSU Branch"
        required: true
        type: choice
        options: ["Stable", "Dev"]
        default: "Dev"
      version:
        description: "Version Suffix (optional)"
        required: false
        type: string
      use_susfs:
        description: "Enable SUSFS?"
        required: true
        type: boolean
        default: true
      use_kpm:
        description: "Enable KPM?"
        required: true
        type: boolean
        default: true
      use_lxc:
        description: "Enable LXC?"
        required: true
        type: boolean
        default: false
      get_manager:
        description: "Download Manager APK?"
        required: true
        type: boolean
        default: true

env:
  SONY_KERNEL_URL: "https://github.com/sonyxperiadev/kernel.git"
  KERNEL_IMAGE_NAME: "Image"
  ANYKERNEL_URL: "https://github.com/osm0sis/AnyKernel3.git"
  KPM_URL: "https://github.com/backslashxx/KPM.git"
  SUSFS_URL: "https://gitlab.com/simonpunk/susfs4ksu.git"
  SUSFS_MODULE_URL: "https://github.com/sidex15/susfs4ksu_su_module.git"

jobs:
  build:
    name: "Build Kernel"
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: main

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev cpio unzip wget kmod dwarves

      - name: Configure Git
        run: |
          git config --global user.name "spacealtctrl"
          git config --global user.email "actions@github.com"

      - name: Set Device-Specific Variables
        run: |
          case "${{ inputs.device }}" in
            "Xperia 1 VI / 5 V (SM8650/SM8550)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1VI-5V" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx245_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx245\ndevice.name2=pdx237\ndevice.name3=Xperia 1 VI\ndevice.name4=Xperia 5 V' >> $GITHUB_ENV
              ;;
            "Xperia 1 V (SM8550)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1V" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx234_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx234\ndevice.name2=Xperia 1 V' >> $GITHUB_ENV
              ;;
            "Xperia 1 IV / 5 IV (SM8450)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1IV-5IV" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx223_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx223\ndevice.name2=pdx225\ndevice.name3=Xperia 1 IV\ndevice.name4=Xperia 5 IV' >> $GITHUB_ENV
              ;;
            "Xperia PRO-I / 1 III / 5 III (SM8350)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-PRO-I-1III-5III" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx215_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx215\ndevice.name2=pdx213\ndevice.name3=pdx214\ndevice.name4=Xperia PRO-I\ndevice.name5=Xperia 1 III\ndevice.name6=Xperia 5 III' >> $GITHUB_ENV
              ;;
            "Xperia 1 II / 5 II (SM8250)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1II-5II" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx203_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx203\ndevice.name2=pdx206\ndevice.name3=Xperia 1 II\ndevice.name4=Xperia 5 II' >> $GITHUB_ENV
              ;;
            "Xperia 1 / 5 (SM8150)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-1-5" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx201_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx201\ndevice.name2=pdx194\ndevice.name3=Xperia 1\ndevice.name4=Xperia 5' >> $GITHUB_ENV
              ;;
            "Xperia XZ3 (SDM845)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-XZ3" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx212_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx212\ndevice.name2=Xperia XZ3' >> $GITHUB_ENV
              ;;
            "Xperia XZ2 / XZ2 Premium / XZ2 Compact (SDM845)")
              echo "DEVICE_FRIENDLY_NAME=Xperia-XZ2-Series" >> $GITHUB_ENV
              echo "KERNEL_DEFCONFIG=aosp_pdx204_defconfig" >> $GITHUB_ENV
              echo 'ANYKERNEL_DEVICE_CHECKS=device.name1=pdx204\ndevice.name2=pdx205\ndevice.name3=pdx207\ndevice.name4=Xperia XZ2\ndevice.name5=Xperia XZ2 Premium\ndevice.name6=Xperia XZ2 Compact' >> $GITHUB_ENV
              ;;
          esac

      - name: Setup Clang (Git Clone Method)
        run: |
          echo "Setting up Clang toolchain using git clone..."
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 build-tools
          
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CLANG_PATH=$(pwd)/build-tools/linux-x86" >> $GITHUB_ENV
          echo "GCC_PATH=$(pwd)/build-tools/linux-x86/bin" >> $GITHUB_ENV

      - name: Clone Kernel
        run: |
          echo "Cloning Sony kernel from default branch..."
          # The public GitHub repo does not have the specific AOSP branches.
          # Cloning the default branch is the most reliable method as it contains all the necessary defconfigs.
          git clone --depth=1 "${{ env.SONY_KERNEL_URL }}" kernel
          echo "KERNEL_PATH=$(pwd)/kernel" >> $GITHUB_ENV

      - name: Integrate KernelSU
        run: |
          cd kernel

          ksu_branch_arg="main"
          if [[ "${{ inputs.kernelsu_branch }}" == "Dev" ]]; then
            ksu_branch_arg="dev"
          fi

          setup_script_url=""
          case "${{ inputs.kernelsu_variant }}" in
            "Official") setup_script_url="https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" ;;
            "Next") setup_script_url="https://raw.githubusercontent.com/rifsxd/KernelSU-Next/dev/kernel/setup.sh" ;;
            "MKSU") setup_script_url="https://raw.githubusercontent.com/5ec1cff/KernelSU/main/kernel/setup.sh" ;;
            "SukiSU"|"SukiSU-Ultra") setup_script_url="https://raw.githubusercontent.com/SukiSue/SukiSU/main/kernel/setup.sh" ;;
          esac
          
          if [ -z "$setup_script_url" ]; then
            echo "::error::Invalid KernelSU variant selected."
            exit 1
          fi

          echo "Integrating ${{ inputs.kernelsu_variant }} using branch '$ksu_branch_arg'..."
          export GIT_TERMINAL_PROMPT=0
          curl -LSs "$setup_script_url" | bash -s "$ksu_branch_arg"

      - name: Integrate SUSFS
        if: ${{ inputs.use_susfs }}
        run: |
          cd kernel
          git clone --depth=1 "${{ env.SUSFS_URL }}" ../susfs
          
          if [ -f "../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" ]; then
            patch -p1 < "../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || git apply "../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || echo "SUSFS patch may have issues"
          fi
          
          if [ -d "../susfs/ksu_module_susfs" ]; then
            cp -r "../susfs/ksu_module_susfs" ./
          fi

      - name: Apply KPM
        if: ${{ inputs.use_kpm }}
        run: |
          cd kernel
          git clone --depth=1 "${{ env.KPM_URL }}" ../KPM
          
          if [ -f "../KPM/patch-kernel.sh" ]; then
            bash "../KPM/patch-kernel.sh" --apply
          else
            if [ -d "../KPM/patches" ]; then
              for patch in ../KPM/patches/*.patch; do
                [ -f "$patch" ] && git apply "$patch" || echo "Failed to apply $(basename "$patch")"
              done
            fi
          fi

      - name: Apply Additional Patches
        run: |
          cd kernel
          
          if [ "${{ inputs.use_lxc }}" == "true" ]; then
            if [ -f "../main/patches/lxc.patch" ]; then
              git apply "../main/patches/lxc.patch" || echo "LXC patch not available"
            fi
          fi
          
          if [ -d "../main/patches/core" ]; then
            for patch in ../main/patches/core/*.patch; do
              [ -f "$patch" ] && git apply "$patch" || echo "Failed to apply $(basename "$patch")"
            done
          fi

      - name: Configure Kernel
        run: |
          cd kernel
          
          export PATH="${{ env.CLANG_PATH }}/bin:${{ env.GCC_PATH }}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="spacealtctrl"
          export KBUILD_BUILD_HOST="GitHub-Actions"
          
          echo "Using defconfig: ${{ env.KERNEL_DEFCONFIG }}"
          make O=out LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} CROSS_COMPILE=${{ env.CLANG_TRIPLE }} ${{ env.KERNEL_DEFCONFIG }}
          
          if [ "${{ inputs.use_susfs }}" == "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_SU_HIDE=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> out/.config
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> out/.config
          fi
          
          if [ "${{ inputs.use_lxc }}" == "true" ]; then
            echo "CONFIG_NAMESPACES=y" >> out/.config
            echo "CONFIG_NET_NS=y" >> out/.config
            echo "CONFIG_PID_NS=y" >> out/.config
            echo "CONFIG_IPC_NS=y" >> out/.config
            echo "CONFIG_UTS_NS=y" >> out/.config
            echo "CONFIG_CGROUPS=y" >> out/.config
            echo "CONFIG_CGROUP_DEVICE=y" >> out/.config
            echo "CONFIG_CPUSETS=y" >> out/.config
          fi

      - name: Build Kernel
        run: |
          cd kernel
          export PATH="${{ env.CLANG_PATH }}/bin:${{ env.GCC_PATH }}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="spacealtctrl"
          export KBUILD_BUILD_HOST="GitHub-Actions"
          
          make O=out LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} CROSS_COMPILE=${{ env.CLANG_TRIPLE }} -j$(nproc) || {
            echo "Build failed"
            exit 1
          }

      - name: Package Kernel
        run: |
          git clone --depth=1 "${{ env.ANYKERNEL_URL }}" AnyKernel3
          cd AnyKernel3
          
          rm -rf .git* README.md modules patch ramdisk tools anykernel.sh
          cp ../kernel/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} ./
          
          # Dynamically create the anykernel.sh script
          cat > anykernel.sh <<- EOL
          # AnyKernel3 Script
          properties() { '
          kernel.string=KernelSU for ${{ env.DEVICE_FRIENDLY_NAME }} by spacealtctrl
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          ${{ env.ANYKERNEL_DEVICE_CHECKS }}
          supported.versions=13-15
          '; } # end properties
          
          block=boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          
          . tools/ak3-core.sh;
          
          dump_boot;
          write_boot;
          EOL
          
          VERSION_SUFFIX="${{ inputs.version }}"
          SUSFS_SUFFIX=""
          KPM_SUFFIX=""
          if [ "${{ inputs.use_susfs }}" == "true" ]; then SUSFS_SUFFIX="-SUSFS"; fi
          if [ "${{ inputs.use_kpm }}" == "true" ]; then KPM_SUFFIX="-KPM"; fi
          
          ZIP_NAME="Sony-${{ env.DEVICE_FRIENDLY_NAME }}-${{ inputs.kernelsu_variant }}${SUSFS_SUFFIX}${KPM_SUFFIX}${VERSION_SUFFIX:+-${VERSION_SUFFIX}}-$(date +'%Y%m%d').zip"
          zip -r9 "$ZIP_NAME" ./* -x ".git*" -x "README.md" -x "*.zip"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sony-${{ env.DEVICE_FRIENDLY_NAME }}-Kernel-${{ github.run_id }}
          path: |
            AnyKernel3/*.zip
            kernel/out/arch/arm64/boot/Image

  get-manager:
    name: Get Manager
    needs: build
    if: ${{ inputs.get_manager }}
    runs-on: ubuntu-latest
    steps:
      - name: Set Manager Repo
        run: |
          variant="${{ inputs.kernelsu_variant }}"
          case "$variant" in
            "Official") REPO="tiann/KernelSU" ;;
            "Next") REPO="rifsxd/KernelSU-Next" ;;
            "MKSU") REPO="5ec1cff/KernelSU" ;;
            "SukiSU"|"SukiSU-Ultra") REPO="SukiSue/SukiSU" ;;
          esac
          echo "KSU_REPO=$REPO" >> $GITHUB_ENV

      - name: Download Manager
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ env.KSU_REPO }}" ]; then
            gh release download -R "${{ env.KSU_REPO }}" -p "*.apk" --clobber || echo "No APK found"
          fi
          
      - name: Upload Manager
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Manager-APK-${{ inputs.kernelsu_variant }}
          path: "*.apk"

  download-susfs-module:
    name: Download SUSFS Module
    needs: build
    if: ${{ inputs.use_susfs }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Module
        run: |
          git clone --depth=1 "${{ env.SUSFS_MODULE_URL }}" susfs-module || {
            mkdir -p susfs-module
            cd susfs-module
            wget -q "https://github.com/sidex15/susfs4ksu_su_module/releases/latest/download/susfs4ksu_module.zip" -O susfs_module.zip || echo "No module found"
          }
          
          find susfs-module -name "*.zip" -exec cp {} ./ \; 2>/dev/null || echo "No zip files found"
          
      - name: Upload Module
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SUSFS-Module-${{ github.run_id }}
          path: "*.zip"
