name: Build Sony Xperia 1V Enhanced Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://android.googlesource.com/kernel/common'
        type: string
      kernel_source_branch:
        description: 'Kernel Source Branch'
        required: true
        default: 'android13-5.15-lts'
        type: string
      kernel_defconfig:
        description: 'Kernel Defconfig'
        required: true
        default: 'gki_defconfig'
        type: string
      clang_version:
        description: 'Clang Version'
        required: true
        default: 'r487747c'
        type: choice
        options:
          - r487747c
          - r475365b
          - r450784e
          - r416183b
      enable_ksu:
        description: 'Enable KernelSU'
        required: true
        default: true
        type: boolean
      ksu_tag:
        description: 'KernelSU Version'
        required: false
        default: 'main'
        type: choice
        options:
          - main
          - v0.9.5
          - v0.9.4
          - v0.9.3
      enable_susfs:
        description: 'Enable SUSFS'
        required: true
        default: true
        type: boolean
      susfs_version:
        description: 'SUSFS Version'
        required: false
        default: '1.4.3'
        type: choice
        options:
          - '1.4.3'
          - '1.4.2'
          - '1.4.1'
          - main
      enable_thermal_mgmt:
        description: 'Enable Thermal Management Improvements'
        required: true
        default: true
        type: boolean
      enable_camera_opt:
        description: 'Enable Camera Optimizations'
        required: true
        default: true
        type: boolean
      enable_display_opt:
        description: 'Enable 4K 120Hz Display Optimizations'
        required: true
        default: true
        type: boolean
      enable_audio_opt:
        description: 'Enable Audio Improvements'
        required: true
        default: true
        type: boolean
      enable_gaming_opt:
        description: 'Enable Gaming Performance Tweaks'
        required: true
        default: true
        type: boolean
      build_boot_img:
        description: 'Build Boot Image'
        required: false
        default: true
        type: boolean
      anykernel3:
        description: 'Use AnyKernel3'
        required: false
        default: true
        type: boolean
      custom_name:
        description: 'Custom Kernel Name (optional)'
        required: false
        default: 'Xperia1V-Enhanced'
        type: string

jobs:
  build:
    name: Build Sony Xperia 1V Enhanced Kernel
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_BASEDIR: "$GITHUB_WORKSPACE"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        echo "Free space:"
        df -h
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev \
          libudev-dev libpci-dev libiberty-dev autoconf device-tree-compiler \
          git ccache automake lzop bsdmainutils curl libxml2-utils

    - name: Set swap space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-xperia-${{ inputs.clang_version }}-${{ github.run_id }}
        restore-keys: |
          build-kernel-xperia-${{ inputs.clang_version }}-

    - name: Setup Clang
      run: |
        mkdir clang
        cd clang
        wget -O clang.tar.xz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${{ inputs.clang_version }}.tar.xz"
        tar -xf clang.tar.xz
        echo "$(pwd)/bin" >> $GITHUB_PATH

    - name: Get kernel source
      run: |
        git clone --depth=1 --single-branch --branch ${{ inputs.kernel_source_branch }} \
          ${{ inputs.kernel_source }} kernel-source
        cd kernel-source
        echo "KERNEL_VERSION=$(make kernelversion)" >> $GITHUB_ENV

    - name: Setup KernelSU
      if: ${{ inputs.enable_ksu }}
      working-directory: kernel-source
      run: |
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s ${{ inputs.ksu_tag }}
        echo "KSU_GIT_VERSION=$(cd KernelSU && git rev-list --count HEAD)" >> $GITHUB_ENV
        echo "KSU_VERSION=$(cd KernelSU && git describe --always --tags --dirty)" >> $GITHUB_ENV
        echo "CONFIG_KPROBES=y" >> arch/arm64/configs/${{ inputs.kernel_defconfig }}
        echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/${{ inputs.kernel_defconfig }}
        echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/${{ inputs.kernel_defconfig }}

    - name: Setup SUSFS
      if: ${{ inputs.enable_susfs }}
      working-directory: kernel-source
      run: |
        git clone https://gitlab.com/simonpunk/susfs4ksu.git -b ${{ inputs.susfs_version }} drivers/susfs
        echo "source \"drivers/susfs/Kconfig\"" >> drivers/Kconfig
        echo "obj-\$(CONFIG_SUSFS) += susfs/" >> drivers/Makefile
        cat >> arch/arm64/configs/${{ inputs.kernel_defconfig }} << EOF
        CONFIG_SUSFS=y
        CONFIG_SUSFS_OPEN_REDIRECT=y
        CONFIG_SUSFS_SUS_PATH=y
        CONFIG_SUSFS_SUS_MOUNT=y
        CONFIG_SUSFS_SUS_KSTAT=y
        CONFIG_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_PATH=y
        CONFIG_SUSFS_SUS_SU=y
        EOF

    - name: Apply Thermal Management Optimizations
      if: ${{ inputs.enable_thermal_mgmt }}
      working-directory: kernel-source
      run: |
        cat >> arch/arm64/configs/${{ inputs.kernel_defconfig }} << EOF
        # Thermal Management Optimizations for Snapdragon 8 Gen 2
        CONFIG_THERMAL_GOV_USER_SPACE=y
        CONFIG_THERMAL_GOV_LOW_LIMITS=y
        CONFIG_THERMAL_GOV_STEP_WISE=y
        CONFIG_THERMAL_EMULATION=y
        CONFIG_LIMITS_MONITOR=y
        CONFIG_LIMITS_LITE_HW=y
        CONFIG_MSM_BCL_CTL=y
        CONFIG_MSM_BCL_PERIPHERAL_CTL=y
        EOF

    - name: Apply Camera Optimizations  
      if: ${{ inputs.enable_camera_opt }}
      working-directory: kernel-source
      run: |
        cat >> arch/arm64/configs/${{ inputs.kernel_defconfig }} << EOF
        # Camera Optimizations for Sony Xperia
        CONFIG_MEDIA_CAMERA_SUPPORT=y
        CONFIG_VIDEO_V4L2_SUBDEV_API=y
        CONFIG_VIDEOBUF2_CORE=y
        CONFIG_VIDEOBUF2_MEMOPS=y
        CONFIG_VIDEOBUF2_DMA_CONTIG=y
        CONFIG_MEDIA_CONTROLLER=y
        CONFIG_VIDEO_ADV_DEBUG=y
        CONFIG_SPECTRA_CAMERA=y
        EOF

    - name: Apply Display Optimizations
      if: ${{ inputs.enable_display_opt }}
      working-directory: kernel-source
      run: |
        cat >> arch/arm64/configs/${{ inputs.kernel_defconfig }} << EOF
        # 4K 120Hz Display Optimizations
        CONFIG_FB_MSM_MDSS=y
        CONFIG_FB_MSM_MDSS_DSI_CTRL_STATUS=y
        CONFIG_FB_MSM_MDSS_XLOG_DEBUG=y
        CONFIG_DRM_MSM=y
        CONFIG_DRM_MSM_DSI=y
        CONFIG_DRM_MSM_DP=y
        CONFIG_BACKLIGHT_QCOM_WLED=y
        CONFIG_DRM_PANEL_SONY_TULIP_CMD=y
        EOF

    - name: Apply Audio Optimizations
      if: ${{ inputs.enable_audio_opt }}
      working-directory: kernel-source
      run: |
        cat >> arch/arm64/configs/${{ inputs.kernel_defconfig }} << EOF
        # Audio Improvements for Sony Xperia
        CONFIG_SND_SOC_WCD938X=y
        CONFIG_SND_SOC_WCD938X_SLAVE=y
        CONFIG_AUDIO_EXT_CLK=y
        CONFIG_SND_SOC_WCD_MBHC=y
        CONFIG_WCD9XXX_CODEC_CORE=y
        CONFIG_MSM_QDSP6V2_CODECS=y
        CONFIG_MSM_ULTRASOUND=y
        CONFIG_SND_SOC_MSM_QDSP6V2_INTF=y
        EOF

    - name: Apply Gaming Performance Tweaks
      if: ${{ inputs.enable_gaming_opt }}
      working-directory: kernel-source
      run: |
        cat >> arch/arm64/configs/${{ inputs.kernel_defconfig }} << EOF
        # Gaming Performance Tweaks
        CONFIG_MSM_KGSL=y
        CONFIG_MSM_ADRENO_TZ=y
        CONFIG_MSM_ADRENO_DEFAULT_GOVERNOR="msm-adreno-tz"
        CONFIG_CPU_FREQ_GOV_INTERACTIVE=y
        CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
        CONFIG_CPU_INPUT_BOOST=y
        CONFIG_DYNAMIC_STUNE_BOOST=y
        CONFIG_CPU_FREQ_TIMES=y
        EOF

    - name: Apply Base Performance Optimizations
      working-directory: kernel-source
      run: |
        cat >> arch/arm64/configs/${{ inputs.kernel_defconfig }} << EOF
        
        # Base Performance Optimizations for Sony Xperia 1V
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        # CONFIG_CC_OPTIMIZE_FOR_SIZE is not set
        
        # CPU Governors
        CONFIG_CPU_FREQ_GOV_ONDEMAND=y
        CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y
        CONFIG_CPU_FREQ_GOV_USERSPACE=y
        CONFIG_CPU_FREQ_GOV_PERFORMANCE=y
        CONFIG_CPU_FREQ_GOV_POWERSAVE=y
        
        # I/O Schedulers
        CONFIG_MQ_IOSCHED_DEADLINE=y
        CONFIG_MQ_IOSCHED_KYBER=y
        CONFIG_IOSCHED_BFQ=y
        CONFIG_BFQ_GROUP_IOSCHED=y
        
        # Memory Management
        CONFIG_ZRAM=y
        CONFIG_ZRAM_DEF_COMP_LZ4=y
        CONFIG_LZ4_COMPRESS=y
        CONFIG_LZ4_DECOMPRESS=y
        CONFIG_ZSMALLOC=y
        CONFIG_ZSMALLOC_STAT=y
        
        # Network Optimizations  
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_DEFAULT_TCP_CONG="bbr"
        
        # Security
        CONFIG_SECURITY_SELINUX_DEVELOP=y
        CONFIG_SECURITY_SELINUX_AVC_STATS=y
        
        # Remove debugging overhead for performance
        # CONFIG_DEBUG_INFO is not set
        # CONFIG_SLUB_DEBUG is not set
        # CONFIG_DEBUG_PREEMPT is not set
        # CONFIG_DEBUG_BUGVERBOSE is not set
        # CONFIG_FTRACE is not set
        # CONFIG_KASAN is not set
        # CONFIG_UBSAN is not set
        EOF

    - name: Build kernel
      working-directory: kernel-source  
      run: |
        export PATH="/usr/lib/ccache:$PATH"
        export KBUILD_BUILD_HOST=GitHub-Actions
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        args="
        CC=clang
        ARCH=arm64
        CROSS_COMPILE=aarch64-linux-gnu-
        CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        CLANG_TRIPLE=aarch64-linux-gnu-
        O=out
        -j$(nproc --all)
        "
        
        make ${args} ${{ inputs.kernel_defconfig }}
        make ${args} Image.gz

    - name: Check kernel image
      working-directory: kernel-source
      run: |
        if [ -f out/arch/arm64/boot/Image.gz ]; then
          echo "Kernel image built successfully"
          echo "KERNEL_SIZE=$(stat -c%s out/arch/arm64/boot/Image.gz)" >> $GITHUB_ENV
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "Kernel image not found!"
          exit 1
        fi

    - name: Prepare AnyKernel3
      if: ${{ inputs.anykernel3 && env.BUILD_SUCCESS == 'true' }}
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
        
        # Configure for Sony Xperia 1V
        cat > AnyKernel3/anykernel.sh << 'EOF'
        # AnyKernel3 Ramdisk Mod Script
        
        ## AnyKernel setup
        properties() { '
        kernel.string=${{ inputs.custom_name }} by ${{ github.actor }}
        do.devicecheck=1
        do.modules=0
        do.systemless=1
        do.cleanup=1
        do.cleanuponabort=0
        device.name1=XQ-DQ54
        device.name2=XQ-DQ62
        device.name3=XQ-DQ72
        device.name4=pdx234
        supported.versions=13
        '; } # end properties
        
        block=/dev/block/by-name/boot;
        is_slot_device=1;
        ramdisk_compression=auto;
        patch_vbmeta_flag=auto;
        
        . tools/ak3-core.sh;
        
        ## AnyKernel install
        dump_boot;
        write_boot;
        EOF
        
        cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
        
        # Create flashable zip
        cd AnyKernel3
        zip -r9 "../${{ inputs.custom_name }}-${{ env.KERNEL_VERSION }}-$(date +%Y%m%d-%H%M).zip" \
          * -x .git README.md *placeholder

    - name: Upload kernel image
      if: ${{ env.BUILD_SUCCESS == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.custom_name }}-Image
        path: kernel-source/out/arch/arm64/boot/Image.gz
        retention-days: 7

    - name: Upload AnyKernel3 flashable
      if: ${{ inputs.anykernel3 && env.BUILD_SUCCESS == 'true' }}
      uses: actions/upload-artifact@v4  
      with:
        name: ${{ inputs.custom_name }}-Flashable
        path: "*.zip"
        retention-days: 7

    - name: Build Summary
      if: always()
      run: |
        echo "## Sony Xperia 1V Enhanced Kernel Build" >> $GITHUB_STEP_SUMMARY
        echo "### Configuration" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel Version:** ${{ env.KERNEL_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Clang Version:** ${{ inputs.clang_version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Custom Name:** ${{ inputs.custom_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status:** ${{ env.BUILD_SUCCESS && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ env.BUILD_SUCCESS }}" = "true" ]; then
          echo "- **Kernel Size:** $(echo ${{ env.KERNEL_SIZE }} | numfmt --to=iec-i)B" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Features Enabled" >> $GITHUB_STEP_SUMMARY
        echo "- **KernelSU:** ${{ inputs.enable_ksu && '✅' || '❌' }} ${{ inputs.enable_ksu && inputs.ksu_tag || '' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **SUSFS:** ${{ inputs.enable_susfs && '✅' || '❌' }} ${{ inputs.enable_susfs && inputs.susfs_version || '' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Thermal Management:** ${{ inputs.enable_thermal_mgmt && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Camera Optimizations:** ${{ inputs.enable_camera_opt && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Display Optimizations:** ${{ inputs.enable_display_opt && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Audio Improvements:** ${{ inputs.enable_audio_opt && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Gaming Performance:** ${{ inputs.enable_gaming_opt && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **AnyKernel3:** ${{ inputs.anykernel3 && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
